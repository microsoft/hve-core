name: Docusaurus Tests

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on test failures'
        required: false
        type: boolean
        default: false
      changed-files-only:
        description: 'Only run tests when Docusaurus content or config changed'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Docusaurus Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has-docs-changes: ${{ steps.detect.outputs.has-docs-changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check Docusaurus changes
        id: detect
        shell: pwsh
        run: |
          if ('${{ inputs.changed-files-only }}' -ne 'true') {
            'has-docs-changes=true' >> $env:GITHUB_OUTPUT
            Write-Output 'Docusaurus tests requested for all files.'
          } else {
            $baseRef = if ($env:GITHUB_BASE_REF) { $env:GITHUB_BASE_REF } else { 'main' }
            # Trigger on any change under docs/: the whole-site build compiles all of
            # docs/** (docusaurus.config.js sets the docs plugin path to '../', excluding
            # only docusaurus/** and announcements/**), so watching docs/ matches the
            # build's real input set. This catches broken links in markdown content
            # pages on the PR instead of only on the post-merge deploy build.
            # The collections/ tree is included because docusaurus.config.js reads
            # collections/*.collection.yml at build time (collectionCounts) and the
            # tests consume it via COLLECTIONS_DIR, so changes there alter site and
            # test output. The workflow files themselves are included so test/config
            # changes still trigger a run.
            $changed = @(git diff --name-only --diff-filter=ACMR "origin/$baseRef...HEAD" -- `
              docs `
              collections `
              .github/workflows/docusaurus-tests.yml `
              .github/workflows/deploy-docs.yml)

            if ($changed.Count -gt 0) {
              'has-docs-changes=true' >> $env:GITHUB_OUTPUT
              Write-Output "Detected $($changed.Count) changed file(s) affecting the Docusaurus site"
              $changed | ForEach-Object { Write-Output "- $_" }
            } else {
              'has-docs-changes=false' >> $env:GITHUB_OUTPUT
              Write-Output 'No Docusaurus app or config changes detected'
            }
          }

  docusaurus:
    name: Docusaurus Unit Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-docs-changes == 'true'
    permissions:
      contents: read
      id-token: write  # Required for Codecov OIDC
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: docs/docusaurus/package-lock.json

      - name: Install dependencies
        working-directory: docs/docusaurus
        run: npm ci

      - name: Lint accessibility
        working-directory: docs/docusaurus
        run: npm run lint:a11y

      - name: Lint label registry (COGA-1)
        working-directory: docs/docusaurus
        run: npm run lint:label-registry

      - name: Typecheck
        working-directory: docs/docusaurus
        run: npm run typecheck

      - name: Run tests
        working-directory: docs/docusaurus
        run: npm run test:coverage
        env:
          COLLECTIONS_DIR: ${{ github.workspace }}/collections
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload to Codecov
        if: success()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: docs/docusaurus/coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: docusaurus
          name: docusaurus-coverage
        continue-on-error: true

      - name: Build site
        working-directory: docs/docusaurus
        run: npm run build

      # Playwright drives the runner's maintained Google Chrome stable build
      # via `channel: 'chrome'` in playwright.config.ts instead of
      # self-downloading a bundled Chromium. Self-downloading failed
      # deterministically in CI: the archive downloaded in full but extraction
      # silently dropped the main `chrome` binary while the install still
      # exited 0, so no retry or disk-space change could recover it. This step
      # is the single source of the shared Chrome dependency; its presence
      # check and `--version` echo guard the e2e suite by failing the job
      # loudly here -- with a clear message -- rather than as an opaque
      # browser-launch error downstream.
      - name: Provision system Chrome
        run: |
          set -u
          chrome_bin="$(command -v google-chrome || command -v google-chrome-stable || true)"
          if [ -z "$chrome_bin" ]; then
            echo "::error::No system Google Chrome found on the runner; Playwright requires it"
            exit 1
          fi
          echo "Using system Chrome at: $chrome_bin"
          "$chrome_bin" --version

      # Playwright drives Google Chrome stable via `channel: 'chrome'` in
      # playwright.config.ts, reusing the runner's maintained Chrome build
      # instead of self-downloading a bundled Chromium, so no browser install
      # or cache step is needed. The "Provision system Chrome" step above is
      # the shared dependency and already fails the job loudly when no system
      # Chrome is present. This step owns its own e2e server (Playwright's
      # webServer config). The full-site accessibility crawl runs as the
      # site-crawl spec within this suite.
      - name: Accessibility journeys (Playwright)
        working-directory: docs/docusaurus
        run: npm run test:e2e
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docusaurus-test-results
          path: docs/docusaurus/test-results/
          retention-days: 30
          if-no-files-found: ignore

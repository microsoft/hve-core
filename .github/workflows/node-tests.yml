name: Node Tests

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory containing the skill whose Node tests to run'
        required: true
        type: string
      soft-fail:
        description: 'Whether to continue on test failures'
        required: false
        type: boolean
        default: false
      changed-files-only:
        description: 'Only run tests if .mjs files changed in this directory'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  node-tests:
    name: Node Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Codecov OIDC
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect Node tests
        id: detect
        shell: bash
        run: |
          if find "${{ inputs.working-directory }}" -type d -name node_modules -prune -o -type f \( -name '*.test.mjs' -o -name '*.test.cjs' -o -name '*.test.js' -o -name '*.spec.mjs' -o -name '*.spec.cjs' -o -name '*.spec.js' \) -print 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No *.test.* / *.spec.* (mjs/cjs/js) files under ${{ inputs.working-directory }}"
          fi

      - name: Check for changed JS-family files
        id: check-mjs
        if: inputs.changed-files-only && steps.detect.outputs.has_tests == 'true'
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if git diff --name-only "$BASE_SHA" HEAD | grep -qE "^${{ inputs.working-directory }}/.*\.(mjs|cjs|js)$"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No .mjs/.cjs/.js files changed in ${{ inputs.working-directory }}"
          fi

      - name: Set up Node
        if: steps.detect.outputs.has_tests == 'true' && (!inputs.changed-files-only || steps.check-mjs.outputs.has_changes == 'true')
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Run Node tests with coverage
        if: steps.detect.outputs.has_tests == 'true' && (!inputs.changed-files-only || steps.check-mjs.outputs.has_changes == 'true')
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          # Collect *.test.* / *.spec.* modules across the JS family so both
          # node --test-native (.test.) and spec-style suites run under coverage.
          mapfile -t testfiles < <(find . -type d -name node_modules -prune -o -type f \( -name '*.test.mjs' -o -name '*.test.cjs' -o -name '*.test.js' -o -name '*.spec.mjs' -o -name '*.spec.cjs' -o -name '*.spec.js' \) -print)
          node --test --experimental-test-coverage \
            --test-reporter=lcov --test-reporter-destination=coverage-node.info \
            --test-reporter=spec --test-reporter-destination=stdout \
            "${testfiles[@]}"
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload to Codecov
        if: success() && steps.detect.outputs.has_tests == 'true' && (!inputs.changed-files-only || steps.check-mjs.outputs.has_changes == 'true')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          working-directory: ${{ inputs.working-directory }}
          files: coverage-node.info
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: node
          name: node-coverage-${{ inputs.working-directory }}
        continue-on-error: true

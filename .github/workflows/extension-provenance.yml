name: Extension Provenance

on:
  workflow_call:
    inputs:
      version:
        description: "Full version to use (e.g., 1.0.0 or empty to use package.json)"
        required: false
        type: string
        default: ""
      channel:
        description: "Release channel (Stable or PreRelease) controlling agent maturity filtering"
        required: false
        type: string
        default: "Stable"
      release-tag:
        description: "GitHub release tag to upload the attestation assets to"
        required: false
        type: string
        default: ""
    outputs:
      collections-matrix:
        description: "JSON matrix of collections that were packaged"
        value: ${{ jobs.discover-collections.outputs.matrix }}

permissions:
  contents: read

jobs:
  discover-collections:
    name: Discover Collection Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PowerShell modules
        uses: ./.github/actions/setup-ps-modules

      - name: Resolve effective version
        id: read-version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version=$(jq -r .version extension/templates/package.template.json)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Discover collection manifests
        id: discover
        shell: pwsh
        run: |
          & ./scripts/extension/Find-CollectionManifests.ps1 -Channel '${{ inputs.channel }}'

  build-attest:
    name: Build and Attest ${{ matrix.id }}
    needs: discover-collections
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-collections.outputs.matrix) }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout Syft config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .syft.yaml
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --ignore-scripts=false

      - name: Setup PowerShell modules
        uses: ./.github/actions/setup-ps-modules

      - name: Prepare extension resources
        shell: pwsh
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          COLLECTION_MANIFEST: ${{ matrix.manifest }}
          COLLECTION_ID: ${{ matrix.id }}
        run: |
          $channel = "$env:INPUT_CHANNEL".Trim()
          if (-not $channel) { $channel = 'Stable' }
          $collection = "$env:COLLECTION_MANIFEST"

          Write-Host "🔧 Preparing extension for $channel channel (collection: $env:COLLECTION_ID)..."
          ./scripts/extension/Prepare-Extension.ps1 -Channel $channel -Collection $collection

      - name: Package extension
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          COLLECTION_MANIFEST: ${{ matrix.manifest }}
          COLLECTION_ID: ${{ matrix.id }}
        run: |
          $version = "$env:INPUT_VERSION".Trim()
          $channel = "$env:INPUT_CHANNEL".Trim()
          if (-not $channel) { $channel = 'Stable' }
          $collection = "$env:COLLECTION_MANIFEST"

          Write-Host "📦 Packaging extension for $channel channel (collection: $env:COLLECTION_ID)..."

          $arguments = @{
            Collection = $collection
          }

          if ($channel -ieq 'PreRelease') {
            $arguments['PreRelease'] = $true
          }

          if ($version) {
            $arguments['Version'] = $version
          }

          if (Test-Path "./CHANGELOG.md") {
            $arguments['ChangelogPath'] = "./CHANGELOG.md"
          }

          ./scripts/extension/Package-Extension.ps1 @arguments

      - name: Download dependency SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-dependencies
          path: ./sbom

      - name: Resolve VSIX filename
        id: vsix
        shell: pwsh
        env:
          VSIX_DIRECTORY: ./extension
        run: |
          $vsixPath = & ./scripts/extension/Resolve-VsixFile.ps1 -DirectoryPath $env:VSIX_DIRECTORY
          $vsixName = Split-Path -Path $vsixPath -Leaf
          "file=$vsixPath" >> $env:GITHUB_OUTPUT
          "name=$vsixName" >> $env:GITHUB_OUTPUT

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.vsix.outputs.file }}
          format: spdx-json
          output-file: extension/${{ steps.vsix.outputs.name }}.spdx.json
          artifact-name: sbom-${{ matrix.id }}
          upload-release-assets: false
          upload-artifact: true
          config: .syft.yaml

      - name: Verify SBOM files exist
        shell: bash
        env:
          VSIX_NAME: ${{ steps.vsix.outputs.name }}
        run: |
          set -euo pipefail
          test -f "extension/${VSIX_NAME}.spdx.json" \
            || { echo "::error::Per-VSIX SBOM not found: extension/${VSIX_NAME}.spdx.json"; exit 1; }
          test -f "sbom/dependencies.spdx.json" \
            || { echo "::error::Dependency SBOM not found: sbom/dependencies.spdx.json"; exit 1; }

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.vsix.outputs.file }}

      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.vsix.outputs.file }}
          sbom-path: extension/${{ steps.vsix.outputs.name }}.spdx.json

      - name: Attest dependency SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.vsix.outputs.file }}
          sbom-path: sbom/dependencies.spdx.json

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          REPOSITORY: ${{ github.repository }}
          VSIX_FILE: ${{ steps.vsix.outputs.file }}
          VSIX_NAME: ${{ steps.vsix.outputs.name }}
          SIGSTORE_PATH: extension/${{ steps.vsix.outputs.name }}.sigstore.json
          INTOTO_PATH: extension/${{ steps.vsix.outputs.name }}.intoto.jsonl
        run: |
          $tag = "$env:RELEASE_TAG".Trim()
          if (-not $tag) {
            $tag = "$env:GITHUB_REF_NAME"
          }

          & ./scripts/extension/Export-AttestationBundle.ps1 -BundlePath $env:BUNDLE_PATH -SigstorePath $env:SIGSTORE_PATH -IntotoPath $env:INTOTO_PATH

          gh release upload $tag `
            $env:VSIX_FILE `
            "extension/$env:VSIX_NAME.spdx.json" `
            $env:SIGSTORE_PATH `
            $env:INTOTO_PATH `
            --clobber -R $env:REPOSITORY

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extension-vsix-${{ matrix.id }}
          path: extension/*.vsix
          retention-days: 30

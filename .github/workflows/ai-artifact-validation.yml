name: AI Artifact Validation

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on AI artifact validation failures'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  ai-artifact-validation:
    name: Validate AI Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PowerShell modules
        uses: ./.github/actions/setup-ps-modules

      - name: Validate AI artifact footers and disclaimers
        id: validate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          & scripts/linting/Validate-PlannerArtifacts.ps1 -FailOnMissing
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-artifact-results
          path: |
            logs/ai-artifact-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Check results
        if: always() && steps.validate.outcome == 'failure' && !inputs.soft-fail
        shell: pwsh
        run: |
          Write-Error "AI artifact validation found violations — check uploaded results for details"
          exit 1

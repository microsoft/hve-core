name: Asset Docs Validation

on:
  workflow_call:
    inputs:
      changed-files-only:
        description: 'Only validate assets and documentation affected by changed files'
        required: false
        type: boolean
        default: true
      base-branch:
        description: 'Base branch or SHA for change detection (defaults to origin/main)'
        required: false
        type: string
        default: ''
      soft-fail:
        description: 'Whether to continue on asset documentation validation failures'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate Asset Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup PowerShell modules
        uses: ./.github/actions/setup-ps-modules

      - name: Run asset documentation validation
        shell: pwsh
        env:
          BASE_BRANCH: ${{ inputs.base-branch }}
          CHANGED_FILES_ONLY: ${{ inputs.changed-files-only }}
        run: |
          $params = @{
            FailOnMissing = $true
            CheckSync = $true
          }
          if ($env:CHANGED_FILES_ONLY -eq 'true') {
            $params['ChangedFilesOnly'] = $true
            if (-not [string]::IsNullOrEmpty($env:BASE_BRANCH)) {
              $params['BaseBranch'] = $env:BASE_BRANCH
            }
          }
          & './scripts/linting/Validate-AssetDocs.ps1' @params
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: asset-docs-validation-results
          path: logs/asset-docs-validation-results.json
          retention-days: 30
          if-no-files-found: ignore

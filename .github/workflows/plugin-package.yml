name: Package Plugins

on:
    workflow_call:
        inputs:
            version:
                description: "Release version (for artifact metadata)"
                required: false
                type: string
                default: ""
        outputs:
            collections-matrix:
                description: "JSON matrix of plugin collections that were packaged"
                value: ${{ jobs.discover-collections.outputs.matrix }}

permissions:
    contents: read

jobs:
    discover-collections:
        name: Discover Plugin Collections
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            matrix: ${{ steps.discover.outputs.matrix }}
        steps:
            - name: Checkout code
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false

            - name: Discover collection manifests
              id: discover
              shell: bash
              run: |
                  matrix_json=$(find collections -name '*.collection.yml' -type f | sort | while IFS= read -r file; do
                    id=$(basename "$file" .collection.yml)
                    echo "{\"id\":\"$id\"}"
                  done | jq -sc '{include: .}')

                  echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
                  echo "Discovered plugin collections:"
                  echo "$matrix_json" | jq .

    package:
        name: Package Plugin ${{ matrix.id }}
        needs: discover-collections
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover-collections.outputs.matrix) }}
        steps:
            - name: Checkout code
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Setup PowerShell modules
              uses: ./.github/actions/setup-ps-modules

            - name: Generate plugins
              run: |
                  mkdir -p logs
                  npm run plugin:generate

            - name: Validate generated plugins
              run: npm run plugin:validate

            - name: Package plugin directory
              shell: bash
              run: |
                  plugin_dir="plugins/${{ matrix.id }}"
                  if [ ! -d "$plugin_dir" ]; then
                    echo "::error::Expected plugin directory not found: $plugin_dir"
                    exit 1
                  fi

                  mkdir -p dist/plugins
                  archive_path="dist/plugins/${{ matrix.id }}.zip"
                  zip -r "$archive_path" "$plugin_dir"

                  if ! zipinfo -l "$archive_path" | awk '
                    $1 ~ /^[bcdlps-][rwx-]{9}$/ && $1 !~ /^[-d]/ { invalid = 1 }
                    END { exit invalid }
                  '; then
                    echo "::error::Archive contains a non-regular entry: $archive_path"
                    exit 1
                  fi

            - name: Upload plugin artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: plugin-package-${{ matrix.id }}
                  path: dist/plugins/${{ matrix.id }}.zip
                  retention-days: 30

name: Python Lint

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'When true, linting warnings do not fail the build'
        required: false
        type: boolean
        default: false
      changed-files-only:
        description: 'When true, lint only changed Python files'
        required: false
        type: boolean
        default: true
      working-directory:
        description: 'Directory containing pyproject.toml with ruff config'
        required: false
        type: string
        default: '.github/skills/experimental/powerpoint'

permissions:
  contents: read

jobs:
  python-lint:
    name: Ruff Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.10.8"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked
        working-directory: ${{ inputs.working-directory }}

      - name: Run ruff check
        id: ruff-check
        run: |
          mkdir -p "$GITHUB_WORKSPACE/logs"
          if ! uv run ruff check . --output-format json > "$GITHUB_WORKSPACE/logs/python-lint-results.json" 2>&1; then
            echo "RUFF_CHECK_FAILED=true" >> "$GITHUB_ENV"
          fi
          uv run ruff check .
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Run ruff format check
        id: ruff-format
        run: |
          if ! uv run ruff format --check . 2>&1; then
            echo "RUFF_FORMAT_FAILED=true" >> "$GITHUB_ENV"
          fi
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload lint results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.3
        if: always()
        with:
          name: python-lint-results
          path: logs/python-lint-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Check results
        if: "!inputs.soft-fail"
        run: |
          if [[ "$RUFF_CHECK_FAILED" == "true" || "$RUFF_FORMAT_FAILED" == "true" ]]; then
            echo "::error::Python linting failed"
            [[ "$RUFF_CHECK_FAILED" == "true" ]] && echo "  - ruff check failed"
            [[ "$RUFF_FORMAT_FAILED" == "true" ]] && echo "  - ruff format check failed"
            exit 1
          fi
          echo "All Python lint checks passed"

name: Python Lint

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'When true, linting warnings do not fail the build'
        required: false
        type: boolean
        default: false
      changed-files-only:
        description: 'When true, lint only changed Python files'
        required: false
        type: boolean
        default: true
      working-directory:
        description: 'Directory containing pyproject.toml with ruff config'
        required: true
        type: string

permissions:
  contents: read

jobs:
  python-lint:
    name: Ruff Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Derive artifact name
        id: meta
        run: echo "artifact-name=python-lint-$(echo '${{ inputs.working-directory }}' | tr '/' '-' | sed 's/^\.//; s/^-//')" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.10.8"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked
        working-directory: ${{ inputs.working-directory }}

      - name: Detect changed Python files
        if: inputs.changed-files-only
        run: |
          base_ref="$GITHUB_BASE_REF"
          base_ref="${base_ref:-main}"
          working_dir="${{ inputs.working-directory }}"
          changed=$(git diff --name-only --diff-filter=ACMR "origin/${base_ref}...HEAD" -- "${working_dir}" | grep -E '\.pyi?$' || true)
          if [[ -n "$changed" ]]; then
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
            file_count=$(echo "$changed" | wc -l)
            echo "Detected ${file_count} changed Python file(s)"
          else
            echo "No Python file changes detected under ${working_dir}"
          fi

      - name: Run ruff check
        id: ruff-check
        if: "!inputs.changed-files-only || env.HAS_CHANGES == 'true'"
        run: |
          mkdir -p "$GITHUB_WORKSPACE/logs"
          # Stdout (JSON) → file only; stderr flows to CI log to preserve valid JSON output
          if ! uv run ruff check . --output-format json > "$GITHUB_WORKSPACE/logs/python-lint-results.json"; then
            echo "RUFF_CHECK_FAILED=true" >> "$GITHUB_ENV"
          fi
          uv run ruff check .
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Run ruff format check
        id: ruff-format
        if: "!inputs.changed-files-only || env.HAS_CHANGES == 'true'"
        run: |
          # Stderr flows to CI log; no file redirect so output stays readable
          if ! uv run ruff format --check .; then
            echo "RUFF_FORMAT_FAILED=true" >> "$GITHUB_ENV"
          fi
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload lint results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.3
        if: always() && (!inputs.changed-files-only || env.HAS_CHANGES == 'true')
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: logs/python-lint-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Check results
        if: "!inputs.soft-fail && (!inputs.changed-files-only || env.HAS_CHANGES == 'true')"
        run: |
          if [[ "$RUFF_CHECK_FAILED" == "true" || "$RUFF_FORMAT_FAILED" == "true" ]]; then
            echo "::error::Python linting failed"
            [[ "$RUFF_CHECK_FAILED" == "true" ]] && echo "  - ruff check failed"
            [[ "$RUFF_FORMAT_FAILED" == "true" ]] && echo "  - ruff format check failed"
            exit 1
          fi
          echo "All Python lint checks passed"

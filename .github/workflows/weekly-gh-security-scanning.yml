name: Weekly GitHub Security Scanning

on:
  schedule:
    - cron: '0 3 * * 1' # Mondays at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  gh-security-scanning:
    name: GitHub Security Scanning
    uses: ./.github/workflows/gh-security-scanning.yml
    permissions:
      contents: read
      security-events: read

  create-gh-security-scanning-issues:
    name: Create GitHub Security Scanning Issues
    needs: [gh-security-scanning]
    uses: ./.github/workflows/create-gh-security-scanning-issues.yml
    permissions:
      issues: write
      security-events: read

name: Stable Marketplace Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (leave empty to auto-detect from latest release)"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Dry run (package only, do not publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  normalize-version:
    name: Normalize Version
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.prerelease == false) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.normalize.outputs.version }}
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - name: Resolve version from event
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "release" ]]; then
            TAG="$EVENT_TAG"
            VERSION="${TAG#hve-core-v}"
            VERSION="${VERSION#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Resolved version from release tag: $VERSION"
          else
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize version string
        id: normalize
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ steps.resolve.outputs.version }}
          INPUT_TAG: ${{ steps.resolve.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          TAG="$INPUT_TAG"

          # Strip leading 'v' and component prefix if present
          VERSION="${VERSION#v}"
          VERSION="${VERSION#hve-core-v}"

          # Auto-detect from latest release tag when no version specified
          if [ -z "$VERSION" ]; then
            TAG=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName' -R "$REPOSITORY")
            VERSION="${TAG#hve-core-v}"
            echo "📦 Auto-detected version from latest release: $VERSION"
          fi

          if [ -z "$TAG" ] && [ -n "$VERSION" ]; then
            TAGS=$(gh release list --exclude-drafts --exclude-pre-releases --limit 100 --json tagName -q '.[].tagName' -R "$REPOSITORY")
            TAG=$(printf '%s\n' "$TAGS" | grep -E "^hve-core-v?$VERSION$" | head -1)
          fi

          if [ -z "$TAG" ]; then
            echo "::error::Unable to resolve a release tag for version $VERSION"
            exit 1
          fi

          # Validate semver format
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION. Expected semantic version (e.g., 2.0.0)"
            exit 1
          fi

          # Even/odd convention: even minor = stable, odd minor = pre-release
          PUBLISH_MINOR=$(echo "$VERSION" | cut -d. -f2)
          if (( PUBLISH_MINOR % 2 == 1 )); then
            echo "::error::Stable channel requires even minor version. Got: $VERSION (odd minor = pre-release)"
            echo "::error::Use the pre-release publish workflow for odd-minor versions"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  discover:
    name: Discover Collections
    needs: [normalize-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PowerShell modules
        uses: ./.github/actions/setup-ps-modules

      - name: Resolve effective version
        id: read-version
        shell: bash
        env:
          INPUT_VERSION: ${{ needs.normalize-version.outputs.version }}
        run: |
          version="$INPUT_VERSION"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Discover collection manifests
        id: discover
        shell: pwsh
        run: |
          & ./scripts/extension/Find-CollectionManifests.ps1 -Channel 'Stable'

  publish:
    name: Publish Extensions
    needs: [normalize-version, discover]
    if: ${{ !inputs.dry-run }}
    uses: ./.github/workflows/extension-marketplace-publish.yml
    with:
      collections-matrix: ${{ needs.discover.outputs.matrix }}
      tag: ${{ needs.normalize-version.outputs.tag }}
      pre-release: false
      verify-attestation: true
    permissions:
      contents: read
      attestations: read
      id-token: write
    secrets: inherit

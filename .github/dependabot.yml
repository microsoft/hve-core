updates:
- commit-message:
    include: scope
    prefix: chore
  directories:
  - /
  - /docs/docusaurus
  - /evals/beval
  groups:
    npm-dependencies:
      patterns:
      - "*"
  labels:
  - dependencies
  - npm
  open-pull-requests-limit: 10
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
- commit-message:
    include: scope
    prefix: chore
  directory: /
  groups:
    github-actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  - dependency-name: "github/gh-aw-actions/**"
  labels:
  - dependencies
  - github-actions
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
- commit-message:
    include: scope
    prefix: chore
  directories:
  - /.github/skills/**
  groups:
    uv-dependencies:
      patterns:
      - "*"
  labels:
  - dependencies
  - python
  open-pull-requests-limit: 10
  package-ecosystem: uv
  schedule:
    day: monday
    interval: weekly
version: 2

slide: {{SLIDE_NUMBER}}
title: "{{TITLE}}"
section: "User Personas"
layout: "blank"

background:
  fill: "#0F1117"

elements:
  - type: textbox
    left: 0.6
    top: 0.8
    width: 12.0
    height: 0.5
    text: "{{TYPE_LABEL}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#BA8CF5"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 1.3
    width: 12.0
    height: 1.1
    text: "{{TITLE}}"
    font: "Segoe UI"
    font_size: 30
    font_color: "#FFFFFF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.6
    width: 12.0
    height: 1.2
    text: "Description\n\n{{PE_DESCRIPTION}}"
    font: "Segoe UI"
    font_size: 13
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.85
    width: 12.0
    height: 1.0
    text: "Goal\n\n{{PE_USER_GOAL}}"
    font: "Segoe UI"
    font_size: 13
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 4.95
    width: 12.0
    height: 1.0
    text: "Needs\n\n{{PE_USER_NEEDS}}"
    font: "Segoe UI"
    font_size: 13
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.05
    width: 12.0
    height: 0.7
    text: "Mindset\n\n{{PE_USER_MINDSET}}"
    font: "Segoe UI"
    font_size: 13
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.9
    width: 8.6
    height: 0.25
    text: "Source: {{SOURCE_PATH}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"

  - type: textbox
    left: 10.7
    top: 6.9
    width: 2.0
    height: 0.25
    text: "{{LAST_UPDATED}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"
    alignment: right

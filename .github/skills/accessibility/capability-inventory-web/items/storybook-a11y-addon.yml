id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - Storybook accessibility addon"
source: https://github.com/microsoft/hve-core
description: "Storybook addon that runs axe-core inside the component explorer surfacing per-story violations during component development and review."
controls:
  - id: storybook-a11y-addon
    title: "Storybook accessibility addon"
    description: "Storybook addon that runs axe-core inside the component explorer surfacing per-story violations during component development and review."
    group: component-testing
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "Storybook accessibility addon is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "Storybook accessibility addon runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 1-4-3
        - 2-4-7
        - 4-1-2
    evidenceHints:
      - "**/.storybook/main.*"
      - "**/.storybook/preview.*"
    references:
      - https://storybook.js.org/addons/@storybook/addon-a11y
      - https://github.com/storybookjs/storybook

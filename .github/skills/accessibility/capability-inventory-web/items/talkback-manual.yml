id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - TalkBack screen reader manual review"
source: https://github.com/microsoft/hve-core
description: "Documented manual TalkBack screen reader pass on Android that exercises swipe navigation landmarks forms and pointer-target sizing to validate name role value and touch interactions."
controls:
  - id: talkback-manual
    title: "TalkBack screen reader manual review"
    description: "Documented manual TalkBack screen reader pass on Android that exercises swipe navigation landmarks forms and pointer-target sizing to validate name role value and touch interactions."
    group: assistive-tech-manual
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "TalkBack screen reader manual review is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "TalkBack screen reader manual review runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 2-1-1
        - 2-4-3
        - 2-5-3
        - 4-1-2
    evidenceHints:
      - docs/**/talkback*.md
    references:
      - https://support.google.com/accessibility/android/answer/6283677
      - https://www.w3.org/WAI/test-evaluate/

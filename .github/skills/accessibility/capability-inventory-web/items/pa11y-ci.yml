id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - Pa11y CI accessibility crawler"
source: https://github.com/microsoft/hve-core
description: "Pa11y CI command-line crawler that runs HTML_CodeSniffer or axe rules against a list of URLs and fails the build on configured WCAG violations."
controls:
  - id: pa11y-ci
    title: "Pa11y CI accessibility crawler"
    description: "Pa11y CI command-line crawler that runs HTML_CodeSniffer or axe rules against a list of URLs and fails the build on configured WCAG violations."
    group: automated-testing
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: high
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "Pa11y CI accessibility crawler is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "Pa11y CI accessibility crawler runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 1-4-3
        - 4-1-2
    evidenceHints:
      - "**/.pa11yci*"
      - "**/pa11y.config.*"
      - "**/pa11yci.json"
    references:
      - https://github.com/pa11y/pa11y-ci
      - https://pa11y.org/

id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - axe-core automated accessibility scanner in CI"
source: https://github.com/microsoft/hve-core
description: "Headless axe-core run against built pages or components in CI that fails the build on rule violations across color contrast ARIA roles labels and structural issues."
controls:
  - id: axe-core-ci
    title: "axe-core automated accessibility scanner in CI"
    description: "Headless axe-core run against built pages or components in CI that fails the build on rule violations across color contrast ARIA roles labels and structural issues."
    group: automated-testing
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: high
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "axe-core automated accessibility scanner in CI is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "axe-core automated accessibility scanner in CI runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 1-4-3
        - 2-1-1
        - 2-4-4
        - 4-1-2
    evidenceHints:
      - "**/.axerc*"
      - "**/axe.config.*"
      - "**/*.axe.json"
    references:
      - https://github.com/dequelabs/axe-core
      - https://www.deque.com/axe/

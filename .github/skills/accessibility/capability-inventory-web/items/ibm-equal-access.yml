id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - IBM Equal Access accessibility checker"
source: https://github.com/microsoft/hve-core
description: "IBM Equal Access engine running as CLI Karma or Cypress integration producing IBM-rule violations and WCAG cross-walks for built pages and components."
controls:
  - id: ibm-equal-access
    title: "IBM Equal Access accessibility checker"
    description: "IBM Equal Access engine running as CLI Karma or Cypress integration producing IBM-rule violations and WCAG cross-walks for built pages and components."
    group: automated-testing
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: high
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "IBM Equal Access accessibility checker is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "IBM Equal Access accessibility checker runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 1-4-3
        - 2-1-1
        - 2-4-4
        - 4-1-2
    evidenceHints:
      - "**/.achecker.*"
      - "**/aceconfig.*"
    references:
      - https://github.com/IBMa/equal-access
      - https://www.ibm.com/able/toolkit/verify/automated

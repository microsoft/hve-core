id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - eslint-plugin-jsx-a11y static analysis"
source: https://github.com/microsoft/hve-core
description: "Static ESLint plugin that flags JSX accessibility anti-patterns at lint time including missing alt attributes invalid ARIA roles and unlabeled interactive elements."
controls:
  - id: eslint-jsx-a11y
    title: "eslint-plugin-jsx-a11y static analysis"
    description: "Static ESLint plugin that flags JSX accessibility anti-patterns at lint time including missing alt attributes invalid ARIA roles and unlabeled interactive elements."
    group: static-analysis
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: high
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "eslint-plugin-jsx-a11y static analysis is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "eslint-plugin-jsx-a11y static analysis runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 2-1-1
        - 2-4-4
        - 4-1-2
    evidenceHints:
      - "**/.eslintrc*"
      - "**/eslint.config.*"
    references:
      - https://github.com/jsx-eslint/eslint-plugin-jsx-a11y

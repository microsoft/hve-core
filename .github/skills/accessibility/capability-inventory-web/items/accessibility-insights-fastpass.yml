id: capability-inventory-web
version: "1.0"
name: "Web Capability Inventory - Accessibility Insights FastPass"
source: https://github.com/microsoft/hve-core
description: "Microsoft Accessibility Insights FastPass automated check that runs axe-core plus tab-stop visualization to catch the most common WCAG issues in one pass."
controls:
  - id: accessibility-insights-fastpass
    title: "Accessibility Insights FastPass"
    description: "Microsoft Accessibility Insights FastPass automated check that runs axe-core plus tab-stop visualization to catch the most common WCAG issues in one pass."
    group: automated-testing
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: high
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "Accessibility Insights FastPass is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "Accessibility Insights FastPass runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      wcag-2-2:
        - 1-1-1
        - 1-3-1
        - 1-4-3
        - 2-1-1
        - 2-4-4
        - 2-4-7
        - 4-1-2
    evidenceHints:
      - "**/accessibility-insights*.json"
      - docs/**/fastpass*.md
    references:
      - https://accessibilityinsights.io/docs/web/getstarted/fastpass/

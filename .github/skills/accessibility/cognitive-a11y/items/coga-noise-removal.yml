id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Remove Visual and Textual Noise"
source: https://www.w3.org/WAI/cognitive/
description: "Decorative imagery filler text and redundant UI chrome that do not support the task are removed."
controls:
  - id: coga-noise-removal
    title: "Remove Visual and Textual Noise"
    description: "Decorative imagery filler text and redundant UI chrome that do not support the task are removed."
    group: visual-design
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Remove Visual and Textual Noise practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Remove Visual and Textual Noise is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - editor-review
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.nngroup.com/articles/visual-noise/
      - https://www.w3.org/WAI/cognitive/

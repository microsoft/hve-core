id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Reuse Familiar UI Patterns"
source: https://www.w3.org/WAI/cognitive/
description: "Surfaces use widely recognized UI patterns rather than inventing novel idioms for common tasks."
controls:
  - id: coga-familiar-patterns
    title: "Reuse Familiar UI Patterns"
    description: "Surfaces use widely recognized UI patterns rather than inventing novel idioms for common tasks."
    group: predictability
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Reuse Familiar UI Patterns practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Reuse Familiar UI Patterns is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.nngroup.com/articles/web-conventions/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Clarify Currency and Units"
source: https://www.w3.org/WAI/cognitive/
description: "Currency symbols measurement units and tax-inclusive totals are spelled out so users do not misread them."
controls:
  - id: coga-currency-clarity
    title: "Clarify Currency and Units"
    description: "Currency symbols measurement units and tax-inclusive totals are spelled out so users do not misread them."
    group: numeracy-locale
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Clarify Currency and Units practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Clarify Currency and Units is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.w3.org/TR/coga-usable/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Show Locale-Safe Date Formats"
source: https://www.w3.org/WAI/cognitive/
description: "Dates use unambiguous format such as the spelled-out month or ISO 8601 to avoid locale-dependent misreading."
controls:
  - id: coga-date-format-locale
    title: "Show Locale-Safe Date Formats"
    description: "Dates use unambiguous format such as the spelled-out month or ISO 8601 to avoid locale-dependent misreading."
    group: numeracy-locale
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Show Locale-Safe Date Formats practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Show Locale-Safe Date Formats is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.iso.org/iso-8601-date-and-time-format.html

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Provide Undo or Confirmation"
source: https://www.w3.org/WAI/cognitive/
description: "Destructive or irreversible actions provide either an undo path or an explicit confirmation step."
controls:
  - id: coga-undo-confirm
    title: "Provide Undo or Confirmation"
    description: "Destructive or irreversible actions provide either an undo path or an explicit confirmation step."
    group: errors-recovery
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Provide Undo or Confirmation practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Provide Undo or Confirmation is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.nngroup.com/articles/error-message-guidelines/
      - https://www.w3.org/WAI/cognitive/

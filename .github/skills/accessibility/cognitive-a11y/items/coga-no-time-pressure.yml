id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Avoid Unnecessary Time Pressure"
source: https://www.w3.org/WAI/cognitive/
description: "Surfaces avoid imposing arbitrary timers countdowns or auto-advance behavior on user-initiated tasks."
controls:
  - id: coga-no-time-pressure
    title: "Avoid Unnecessary Time Pressure"
    description: "Surfaces avoid imposing arbitrary timers countdowns or auto-advance behavior on user-initiated tasks."
    group: time-pressure
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Avoid Unnecessary Time Pressure practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Avoid Unnecessary Time Pressure is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/timing-adjustable.html
      - https://www.w3.org/WAI/cognitive/

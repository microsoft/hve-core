id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Stay Within a Cognitive-Load Budget"
source: https://www.w3.org/WAI/cognitive/
description: "Screens declare a budget for choices controls and competing visuals; designs that exceed the budget are simplified."
controls:
  - id: coga-cognitive-load-budget
    title: "Stay Within a Cognitive-Load Budget"
    description: "Screens declare a budget for choices controls and competing visuals; designs that exceed the budget are simplified."
    group: cognitive-load
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Stay Within a Cognitive-Load Budget practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Stay Within a Cognitive-Load Budget is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.nngroup.com/articles/minimize-cognitive-load/

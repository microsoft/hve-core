id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Prefer Active Voice"
source: https://www.w3.org/WAI/cognitive/
description: "Authors prefer active voice and direct phrasing; passive voice is used only where clearer than the active form."
controls:
  - id: coga-active-voice
    title: "Prefer Active Voice"
    description: "Authors prefer active voice and direct phrasing; passive voice is used only where clearer than the active form."
    group: language-clarity
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Prefer Active Voice practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Prefer Active Voice is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - vale
        - alex
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.plainlanguage.gov/guidelines/conversational/
      - https://www.w3.org/WAI/cognitive/

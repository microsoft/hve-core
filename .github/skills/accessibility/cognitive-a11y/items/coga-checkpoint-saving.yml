id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Persist Progress at Checkpoints"
source: https://www.w3.org/WAI/cognitive/
description: "Long forms and multi-step flows persist progress at every checkpoint so users can leave and return without data loss."
controls:
  - id: coga-checkpoint-saving
    title: "Persist Progress at Checkpoints"
    description: "Long forms and multi-step flows persist progress at every checkpoint so users can leave and return without data loss."
    group: errors-recovery
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Persist Progress at Checkpoints practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Persist Progress at Checkpoints is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.nngroup.com/articles/wizard-design/

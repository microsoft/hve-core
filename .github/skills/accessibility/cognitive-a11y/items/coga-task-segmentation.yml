id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Segment Long Tasks"
source: https://www.w3.org/WAI/cognitive/
description: "Long tasks are broken into smaller steps with clear titles so users can rest resume and recover progress."
controls:
  - id: coga-task-segmentation
    title: "Segment Long Tasks"
    description: "Long tasks are broken into smaller steps with clear titles so users can rest resume and recover progress."
    group: structure-navigation
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Segment Long Tasks practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Segment Long Tasks is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.nngroup.com/articles/wizard-design/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Make Interactions Predictable"
source: https://www.w3.org/WAI/cognitive/
description: "Controls behave the way their visual and textual affordances suggest; surprising actions do not trigger on focus or hover."
controls:
  - id: coga-predictable-interactions
    title: "Make Interactions Predictable"
    description: "Controls behave the way their visual and textual affordances suggest; surprising actions do not trigger on focus or hover."
    group: predictability
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Make Interactions Predictable practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Make Interactions Predictable is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/on-input.html
      - https://www.w3.org/WAI/cognitive/

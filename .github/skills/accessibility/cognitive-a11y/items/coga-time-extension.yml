id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Allow Time Extensions"
source: https://www.w3.org/WAI/cognitive/
description: "Time-limited tasks let users request a clearly visible extension before timing out; defaults are generous."
controls:
  - id: coga-time-extension
    title: "Allow Time Extensions"
    description: "Time-limited tasks let users request a clearly visible extension before timing out; defaults are generous."
    group: time-pressure
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Allow Time Extensions practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Allow Time Extensions is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/timing-adjustable.html
      - https://www.w3.org/WAI/cognitive/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Provide Orientation Instructions"
source: https://www.w3.org/WAI/cognitive/
description: "Screens explain what the page is for who it is for and what users will do; users are not left guessing the goal."
controls:
  - id: coga-orientation-instructions
    title: "Provide Orientation Instructions"
    description: "Screens explain what the page is for who it is for and what users will do; users are not left guessing the goal."
    group: support
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Provide Orientation Instructions practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Provide Orientation Instructions is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.w3.org/TR/coga-usable/

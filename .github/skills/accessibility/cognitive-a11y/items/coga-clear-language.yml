id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Use Clear Language"
source: https://www.w3.org/WAI/cognitive/
description: "Pages and UI text use clear plain language appropriate to the audience; jargon idioms and unnecessary complexity are avoided."
controls:
  - id: coga-clear-language
    title: "Use Clear Language"
    description: "Pages and UI text use clear plain language appropriate to the audience; jargon idioms and unnecessary complexity are avoided."
    group: language-clarity
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Use Clear Language practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Use Clear Language is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - vale
        - alex
        - plain-language-checklist
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.plainlanguage.gov/guidelines/

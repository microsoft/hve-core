id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Hit a Documented Reading Grade"
source: https://www.w3.org/WAI/cognitive/
description: "Content meets a documented reading-grade target verified by readability tooling such as Flesch-Kincaid or SMOG."
controls:
  - id: coga-grade-level-target
    title: "Hit a Documented Reading Grade"
    description: "Content meets a documented reading-grade target verified by readability tooling such as Flesch-Kincaid or SMOG."
    group: language-clarity
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Hit a Documented Reading Grade practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Hit a Documented Reading Grade is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - textstat-flesch-kincaid
        - textstat-smog
        - textstat-coleman-liau
        - textstat-ari
        - readability-budget-ci
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/TR/coga-usable/
      - https://readabilityformulas.com/

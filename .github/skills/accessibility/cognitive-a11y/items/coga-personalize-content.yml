id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Allow Personalization"
source: https://www.w3.org/WAI/cognitive/
description: "Users can adjust density text size language and notification volume without losing functional access."
controls:
  - id: coga-personalize-content
    title: "Allow Personalization"
    description: "Users can adjust density text size language and notification volume without losing functional access."
    group: personalization
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Allow Personalization practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Allow Personalization is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/TR/personalization-semantics-content-1.0/
      - https://www.w3.org/WAI/cognitive/

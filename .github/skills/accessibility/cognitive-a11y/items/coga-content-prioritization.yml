id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Prioritize the Most Important Content"
source: https://www.w3.org/WAI/cognitive/
description: "The most important content appears first on each surface; less critical content is below the fold or behind disclosure."
controls:
  - id: coga-content-prioritization
    title: "Prioritize the Most Important Content"
    description: "The most important content appears first on each surface; less critical content is below the fold or behind disclosure."
    group: structure-navigation
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Prioritize the Most Important Content practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Prioritize the Most Important Content is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - editor-review
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.plainlanguage.gov/guidelines/organize/
      - https://www.w3.org/WAI/cognitive/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Do Not Rely on Color Alone"
source: https://www.w3.org/WAI/cognitive/
description: "Color used to convey meaning is paired with text iconography or position so meaning survives color blindness."
controls:
  - id: coga-color-meaning-redundancy
    title: "Do Not Rely on Color Alone"
    description: "Color used to convey meaning is paired with text iconography or position so meaning survives color blindness."
    group: redundant-encoding
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Do Not Rely on Color Alone practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Do Not Rely on Color Alone is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/use-of-color.html
      - https://www.w3.org/WAI/cognitive/

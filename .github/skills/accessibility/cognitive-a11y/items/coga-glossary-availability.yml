id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Provide a Discoverable Glossary"
source: https://www.w3.org/WAI/cognitive/
description: "Specialized terms link to a glossary entry that can be opened in place without losing context."
controls:
  - id: coga-glossary-availability
    title: "Provide a Discoverable Glossary"
    description: "Specialized terms link to a glossary entry that can be opened in place without losing context."
    group: support
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Provide a Discoverable Glossary practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Provide a Discoverable Glossary is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - terminology-glossary-check
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.w3.org/TR/coga-usable/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Lead With Summary Sections"
source: https://www.w3.org/WAI/cognitive/
description: "Long content opens with a short summary or key-points section that lets users decide whether to read further."
controls:
  - id: coga-summary-headers
    title: "Lead With Summary Sections"
    description: "Long content opens with a short summary or key-points section that lets users decide whether to read further."
    group: structure-navigation
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Lead With Summary Sections practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Lead With Summary Sections is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - editor-review
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.plainlanguage.gov/guidelines/organize/
      - https://www.w3.org/WAI/cognitive/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Maintain Heading Hierarchy"
source: https://www.w3.org/WAI/cognitive/
description: "Pages use a single H1 and a strict descending heading hierarchy that matches the visual structure."
controls:
  - id: coga-headings-hierarchy
    title: "Maintain Heading Hierarchy"
    description: "Pages use a single H1 and a strict descending heading hierarchy that matches the visual structure."
    group: structure-navigation
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Maintain Heading Hierarchy practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Maintain Heading Hierarchy is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - markdownlint-prose-rules
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/tutorials/page-structure/headings/
      - https://www.w3.org/WAI/cognitive/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Define or Avoid Jargon"
source: https://www.w3.org/WAI/cognitive/
description: "Domain-specific or technical terms are avoided when possible and otherwise defined inline or in a glossary."
controls:
  - id: coga-define-jargon
    title: "Define or Avoid Jargon"
    description: "Domain-specific or technical terms are avoided when possible and otherwise defined inline or in a glossary."
    group: language-clarity
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Define or Avoid Jargon practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Define or Avoid Jargon is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - vale
        - terminology-glossary-check
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.plainlanguage.gov/guidelines/words/

id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Make Help Easy to Find"
source: https://www.w3.org/WAI/cognitive/
description: "Contextual help and human assistance paths are reachable from any task screen without leaving the flow."
controls:
  - id: coga-help-availability
    title: "Make Help Easy to Find"
    description: "Contextual help and human assistance paths are reachable from any task screen without leaving the flow."
    group: support
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Make Help Easy to Find practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Make Help Easy to Find is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/help.html
      - https://www.w3.org/WAI/cognitive/

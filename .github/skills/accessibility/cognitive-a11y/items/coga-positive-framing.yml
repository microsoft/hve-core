id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Frame Instructions Positively"
source: https://www.w3.org/WAI/cognitive/
description: "Instructions describe what users should do rather than what they should not do whenever practical."
controls:
  - id: coga-positive-framing
    title: "Frame Instructions Positively"
    description: "Instructions describe what users should do rather than what they should not do whenever practical."
    group: language-clarity
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Frame Instructions Positively practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Frame Instructions Positively is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - editor-review
        - vale
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.plainlanguage.gov/guidelines/conversational/
      - https://www.w3.org/WAI/cognitive/

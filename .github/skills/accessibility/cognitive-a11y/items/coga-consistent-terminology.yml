id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Use Consistent Terminology"
source: https://www.w3.org/WAI/cognitive/
description: "The same concept uses the same word across surfaces and documents; synonym drift is treated as a bug."
controls:
  - id: coga-consistent-terminology
    title: "Use Consistent Terminology"
    description: "The same concept uses the same word across surfaces and documents; synonym drift is treated as a bug."
    group: language-clarity
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Use Consistent Terminology practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Use Consistent Terminology is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - terminology-glossary-check
        - vale
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/TR/coga-usable/
      - https://www.w3.org/WAI/cognitive/

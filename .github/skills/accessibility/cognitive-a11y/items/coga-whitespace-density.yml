id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Manage Density and Whitespace"
source: https://www.w3.org/WAI/cognitive/
description: "Surfaces leave breathing room between groups; dense layouts that hide grouping cues are reworked."
controls:
  - id: coga-whitespace-density
    title: "Manage Density and Whitespace"
    description: "Surfaces leave breathing room between groups; dense layouts that hide grouping cues are reworked."
    group: visual-design
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Manage Density and Whitespace practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Manage Density and Whitespace is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.nngroup.com/articles/white-space/
      - https://www.w3.org/WAI/cognitive/

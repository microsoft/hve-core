id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Make Error Recovery Easy"
source: https://www.w3.org/WAI/cognitive/
description: "Error messages name the field state the cause and describe the corrective action; recovery does not require restarting the task."
controls:
  - id: coga-error-recovery-flow
    title: "Make Error Recovery Easy"
    description: "Error messages name the field state the cause and describe the corrective action; recovery does not require restarting the task."
    group: errors-recovery
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Make Error Recovery Easy practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Make Error Recovery Easy is verified through review or tooling."
    mapsTo:
      capability-inventory-content:
        - error-recovery-flow-review
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/error-suggestion.html
      - https://www.w3.org/WAI/cognitive/

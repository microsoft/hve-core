id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Pair Symbols With Words"
source: https://www.w3.org/WAI/cognitive/
description: "Symbols emoji and abbreviations that carry meaning are paired with words so users with low symbol literacy understand them."
controls:
  - id: coga-symbol-meaning-redundancy
    title: "Pair Symbols With Words"
    description: "Symbols emoji and abbreviations that carry meaning are paired with words so users with low symbol literacy understand them."
    group: redundant-encoding
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Pair Symbols With Words practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Pair Symbols With Words is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.w3.org/TR/coga-usable/

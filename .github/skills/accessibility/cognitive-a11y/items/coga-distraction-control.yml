id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Let Users Suppress Distractions"
source: https://www.w3.org/WAI/cognitive/
description: "Animations carousels and auto-playing media expose a control to pause hide or suppress them."
controls:
  - id: coga-distraction-control
    title: "Let Users Suppress Distractions"
    description: "Animations carousels and auto-playing media expose a control to pause hide or suppress them."
    group: personalization
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Let Users Suppress Distractions practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Let Users Suppress Distractions is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/pause-stop-hide.html
      - https://www.w3.org/WAI/cognitive/

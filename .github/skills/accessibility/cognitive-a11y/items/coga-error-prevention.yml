id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Prevent Errors Before They Happen"
source: https://www.w3.org/WAI/cognitive/
description: "Forms and destructive actions use input constraints inline validation and confirmations to prevent foreseeable errors."
controls:
  - id: coga-error-prevention
    title: "Prevent Errors Before They Happen"
    description: "Forms and destructive actions use input constraints inline validation and confirmations to prevent foreseeable errors."
    group: errors-recovery
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Prevent Errors Before They Happen practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Prevent Errors Before They Happen is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    evidenceHints:
      - "**/content-style-guide.md"
      - "**/readability-report.json"
      - "**/cognitive-audit/*.md"
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/error-prevention-legal-financial-data.html
      - https://www.w3.org/WAI/cognitive/

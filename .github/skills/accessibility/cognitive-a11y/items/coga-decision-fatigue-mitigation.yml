id: cognitive-a11y
version: "1.0"
name: "Cognitive Accessibility - Mitigate Decision Fatigue"
source: https://www.w3.org/WAI/cognitive/
description: "Defaults guided choices and progressive disclosure reduce the number of decisions a user must make to finish a task."
controls:
  - id: coga-decision-fatigue-mitigation
    title: "Mitigate Decision Fatigue"
    description: "Defaults guided choices and progressive disclosure reduce the number of decisions a user must make to finish a task."
    group: cognitive-load
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: scoping
        default: pending
        description: "Project commits to applying the Mitigate Decision Fatigue practice."
      - id: verification
        phase: review-handoff
        default: pending
        description: "Application of Mitigate Decision Fatigue is verified through review or tooling."
    applicability:
      discriminator: surface
      appliesWhen:
        - web
        - mobile-web
        - hybrid-mobile
        - native
        - desktop
        - content
      naWhen:
        - voice-only
      naReason: "Voice-only surfaces use spoken-language guidance instead of written conventions."
    references:
      - https://www.w3.org/WAI/cognitive/
      - https://www.nngroup.com/articles/decision-making/

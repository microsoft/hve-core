  - "aria-colcount"
relatedSuccessCriteria:
  - "wcag-2-2:1-3-1"
  - "wcag-2-2:2-1-1"
  - "wcag-2-2:2-4-3"
  - "wcag-2-2:4-1-2"
referenceImplementationUrl: "https://www.w3.org/WAI/ARIA/apg/patterns/treegrid-email/"
applicability:
  discriminator: "surface"
  appliesWhen:
    - "web"
  naWhen:
    - "mobile-web"
evidenceHints:
  - "**/*.tsx"
  - "**/*.jsx"
  - "**/*.vue"
  - "**/aria-audit/*.json"
references:
  - "https://www.w3.org/WAI/ARIA/apg/patterns/treegrid-email/"
  - "https://www.w3.org/WAI/ARIA/apg/"

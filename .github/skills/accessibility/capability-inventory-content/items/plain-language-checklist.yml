id: capability-inventory-content
version: "1.0"
name: "Content Capability Inventory - Plain-language checklist"
source: https://github.com/microsoft/hve-core
description: "Authoring-time checklist derived from PLAIN guidelines that authors run against new content before merge to catch jargon and unclear phrasing early."
controls:
  - id: plain-language-checklist
    title: "Plain-language checklist"
    description: "Authoring-time checklist derived from PLAIN guidelines that authors run against new content before merge to catch jargon and unclear phrasing early."
    group: human-review
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "Plain-language checklist is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "Plain-language checklist runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      cognitive-a11y:
        - coga-clear-language
        - coga-plain-words
    evidenceHints:
      - docs/**/plain-language*.md
      - docs/templates/**
    references:
      - https://www.plainlanguage.gov/guidelines/
      - https://www.plainlanguage.gov/checklists/

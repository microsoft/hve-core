id: capability-inventory-content
version: "1.0"
name: "Content Capability Inventory - Error-recovery flow review"
source: https://github.com/microsoft/hve-core
description: "Reviewer-driven inspection of error states confirming each error names the field states the cause and offers a recovery path that does not restart the task."
controls:
  - id: error-recovery-flow-review
    title: "Error-recovery flow review"
    description: "Reviewer-driven inspection of error states confirming each error names the field states the cause and offers a recovery path that does not restart the task."
    group: human-review
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "Error-recovery flow review is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "Error-recovery flow review runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      cognitive-a11y:
        - coga-error-recovery-flow
    evidenceHints:
      - docs/**/error*.md
      - docs/**/recovery*.md
    references:
      - https://www.w3.org/WAI/WCAG22/Understanding/error-suggestion.html
      - https://www.nngroup.com/articles/error-message-guidelines/

id: capability-inventory-content
version: "1.0"
name: "Content Capability Inventory - Terminology and glossary check"
source: https://github.com/microsoft/hve-core
description: "Linter or review pass that compares the working glossary against in-content terms to catch synonym drift and undefined jargon before publication."
controls:
  - id: terminology-glossary-check
    title: "Terminology and glossary check"
    description: "Linter or review pass that compares the working glossary against in-content terms to catch synonym drift and undefined jargon before publication."
    group: structural-linting
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "Terminology and glossary check is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "Terminology and glossary check runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      cognitive-a11y:
        - coga-define-jargon
        - coga-consistent-terminology
        - coga-glossary-availability
    evidenceHints:
      - docs/**/glossary*.md
      - .vale.ini
      - styles/**/Terms*
    references:
      - https://vale.sh/docs/topics/styles/
      - https://www.plainlanguage.gov/guidelines/words/

id: capability-inventory-content
version: "1.0"
name: "Content Capability Inventory - textstat readability - Coleman-Liau"
source: https://github.com/microsoft/hve-core
description: "Computes Coleman-Liau Index using character counts rather than syllables; useful where syllable estimation is unreliable for the input language."
controls:
  - id: textstat-coleman-liau
    title: "textstat readability - Coleman-Liau"
    description: "Computes Coleman-Liau Index using character counts rather than syllables; useful where syllable estimation is unreliable for the input language."
    group: readability-metrics
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "textstat readability - Coleman-Liau is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "textstat readability - Coleman-Liau runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      cognitive-a11y:
        - coga-grade-level-target
    evidenceHints:
      - scripts/**/readability*.py
      - scripts/**/textstat*.py
    references:
      - https://github.com/textstat/textstat
      - https://en.wikipedia.org/wiki/Coleman%E2%80%93Liau_index

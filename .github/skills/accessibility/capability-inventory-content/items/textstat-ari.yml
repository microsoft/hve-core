id: capability-inventory-content
version: "1.0"
name: "Content Capability Inventory - textstat readability - ARI"
source: https://github.com/microsoft/hve-core
description: "Computes the Automated Readability Index from characters-per-word and words-per-sentence; cheap to run and a useful tiebreaker against other formulas."
controls:
  - id: textstat-ari
    title: "textstat readability - ARI"
    description: "Computes the Automated Readability Index from characters-per-word and words-per-sentence; cheap to run and a useful tiebreaker against other formulas."
    group: readability-metrics
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    risk: medium
    gates:
      - id: presence
        phase: assessment
        default: pending
        description: "textstat readability - ARI is configured for the surface under review."
      - id: verification
        phase: gap-analysis
        default: pending
        description: "textstat readability - ARI runs in CI or scheduled review and its findings are triaged."
    mapsTo:
      cognitive-a11y:
        - coga-grade-level-target
    evidenceHints:
      - scripts/**/readability*.py
      - scripts/**/textstat*.py
    references:
      - https://github.com/textstat/textstat
      - https://en.wikipedia.org/wiki/Automated_readability_index

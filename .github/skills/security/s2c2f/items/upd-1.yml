id: s2c2f
version: "1.0"
name: OSSF Secure Supply Chain Consumption Framework
controls:
  - id: upd-1
    title: Update vulnerable OSS manually
    group: update
    risk: medium
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: S2C2F ML1 practice. Establish a documented process to manually update vulnerable OSS dependencies when alerts arrive, ensuring known CVEs are addressed even before automation is in place.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Confirm a documented manual OSS update process exists.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify projects without an owner or SLA for manual OSS updates.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to assign owners and SLAs for manual OSS update response.
    evidenceHints:
      - "SECURITY.md"
      - "docs/security/oss-update-process.md"
      - "CONTRIBUTING.md"

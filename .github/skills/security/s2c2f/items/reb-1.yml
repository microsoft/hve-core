id: s2c2f
version: "1.0"
name: OSSF Secure Supply Chain Consumption Framework
controls:
  - id: reb-1
    title: Rebuild OSS on trusted infrastructure
    group: rebuild
    risk: medium
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: S2C2F ML3 practice. Rebuild consumed OSS from source on trusted internal infrastructure to eliminate dependence on upstream prebuilt binaries and to gain provenance over the binaries the organization actually ships.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Detect rebuild pipelines for consumed OSS.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify high-risk OSS that is not rebuilt internally.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to onboard additional OSS into the internal rebuild pipeline.
    evidenceHints:
      - ".github/workflows/rebuild*.yml"
      - "**/rebuild-manifest.yml"
      - "**/rebuild-manifest.yaml"

id: s2c2f
version: "1.0"
name: OSSF Secure Supply Chain Consumption Framework
controls:
  - id: aud-2
    title: Audit that consumption is through the approved ingestion method
    group: audit
    risk: medium
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: S2C2F ML2 practice. Periodically audit that all OSS consumption flows through the approved ingestion method (binary repository manager, internal mirror) and that no project has bypassed the approved path.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Confirm an audit process exists for OSS ingestion paths.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify projects bypassing the approved ingestion method.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to remediate ingestion bypasses and schedule recurring audits.
    evidenceHints:
      - ".github/workflows/audit*.yml"
      - "**/audit-config.yml"
      - "**/audit-config.yaml"

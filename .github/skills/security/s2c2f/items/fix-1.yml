id: s2c2f
version: "1.0"
name: OSSF Secure Supply Chain Consumption Framework
controls:
  - id: fix-1
    title: Implement upstream fixes for vulnerable OSS
    group: fix-upstream
    risk: low
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: S2C2F ML4 practice. Where the organization is blocked by an upstream OSS defect or vulnerability, implement and submit fixes upstream rather than carrying indefinite private patches, contributing back to the ecosystem.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Confirm an upstream contribution process is documented for OSS fixes.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify private patches that should be upstreamed.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to upstream private patches and retire local forks.
    evidenceHints:
      - "CONTRIBUTING.md"
      - "docs/contributing/upstream-contributions.md"
      - "**/patches/*.patch"

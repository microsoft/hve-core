id: s2c2f
version: "1.0"
name: OSSF Secure Supply Chain Consumption Framework
controls:
  - id: enf-2
    title: Enforce usage of a curated OSS feed
    group: enforce
    risk: high
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: S2C2F ML2 practice. Enforce that builds and developer workstations resolve OSS exclusively from a curated, organization-managed feed that adds policy controls beyond the upstream registry.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Confirm enforcement of curated feed usage in build infrastructure.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify build pipelines or workstations resolving OSS outside the curated feed.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to enforce curated-feed-only resolution in remaining environments.
    evidenceHints:
      - ".npmrc"
      - "nuget.config"
      - "pip.conf"
      - ".github/workflows/*.yml"
      - "**/firewall-rules.yml"

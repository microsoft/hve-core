id: s2c2f
version: "1.0"
name: OSSF Secure Supply Chain Consumption Framework
controls:
  - id: ing-1
    title: Use package managers trusted by your organization
    group: ingest
    risk: high
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: S2C2F ML1 practice. Establish an organization-approved list of package managers and ensure developers consume OSS only through them, eliminating ad hoc downloads and reducing typosquat exposure.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Identify which package managers are in use and which are organization-approved.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Determine ecosystems consuming OSS outside approved package managers.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to migrate ad hoc OSS consumption to approved package managers.
    evidenceHints:
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "pyproject.toml"
      - "go.mod"
      - "Cargo.toml"
      - "pom.xml"
      - "*.csproj"

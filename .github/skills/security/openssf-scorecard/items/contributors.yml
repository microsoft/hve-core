id: openssf-scorecard
version: "1.0"
name: OpenSSF Scorecard
controls:
  - id: contributors
    title: Contributors
    risk: low
    assessmentMethod: continuous
    scoreRange:
      min: 0
      max: 10
    description: Counts unique contributors across recent commits as an informational signal of project breadth.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Record unique contributor count and organizational diversity.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Note bus-factor or single-contributor risk.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to broaden contributor base or document maintainers.
    evidenceHints:
      - "MAINTAINERS.md"
      - "CONTRIBUTORS.md"
      - ".github/CODEOWNERS"

id: openssf-scorecard
version: "1.0"
name: OpenSSF Scorecard
controls:
  - id: cii-best-practices
    title: CII-Best-Practices
    risk: low
    assessmentMethod: continuous
    scoreRange:
      min: 0
      max: 10
    description: Confirms enrollment in the OpenSSF Best Practices Badge program and presence of governance baseline files.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Locate badge enrollment status and governance documentation.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify missing badge tier criteria.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to enroll or advance the badge tier.
    evidenceHints:
      - "GOVERNANCE.md"
      - "README.md"
      - ".bestpractices.yml"

id: openssf-scorecard
version: "1.0"
name: OpenSSF Scorecard
controls:
  - id: webhooks
    title: Webhooks
    risk: critical
    assessmentMethod: continuous
    scoreRange:
      min: 0
      max: 10
    description: Verifies that repository webhooks authenticate payloads via configured secrets. Scored 0 or 10.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Inventory configured webhooks and authentication state.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify webhooks lacking secret authentication.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to enforce webhook secret authentication.
    evidenceHints:
      - ".github/settings.yml"
      - ".github/workflows/*.yml"
      - "docs/webhooks*.md"

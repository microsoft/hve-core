id: source-l2
version: "1.1"
name: SLSA Source Track Level 2
source: https://slsa.dev/spec/v1.1/source-requirements
description: Source has authenticated, verifiable revision history.
controls:
  - id: source-l2
    title: Source L2 — Verified history
    description: |
      Source has a verified history. Each revision is associated with an authenticated
      identity (e.g., signed commits or platform-authenticated push) and the history
      is tamper-evident.
    group: source
    risk: high
    assessmentMethod: categorical
    categories:
      - absent
      - partial
      - present
      - verified
    gates:
      - id: authenticated-revisions
        phase: standards-mapping
        default: pending
        description: Each revision is attributed to an authenticated identity.
      - id: tamper-evident-history
        phase: gap-analysis
        default: pending
        description: Revision history cannot be silently rewritten without detection.
    evidenceHints:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
      - .github/settings.yml
      - CODEOWNERS
    references:
      - https://slsa.dev/spec/v1.1/source-requirements

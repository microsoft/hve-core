id: nist-ssdf
version: "1.1"
name: NIST Secure Software Development Framework
controls:
  - id: rv-1-1
    title: Gather Information from Purchasers, Consumers, and Public Sources on Potential Vulnerabilities
    group: RV
    risk: medium
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: Continuously gather information from purchasers, consumers, and public sources on potential vulnerabilities in the software and the third-party components it uses.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Identify the channels and tooling used to monitor vulnerability sources.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify ecosystems or releases without active vulnerability monitoring.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to enable dependency review, advisory subscriptions, or scanners.
    evidenceHints:
      - "SECURITY.md"
      - ".github/dependabot.yml"
      - ".github/workflows/*dependency-review*.yml"
      - ".github/workflows/*advisor*.yml"

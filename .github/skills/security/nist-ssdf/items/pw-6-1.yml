id: nist-ssdf
version: "1.1"
name: NIST Secure Software Development Framework
controls:
  - id: pw-6-1
    title: Use Compiler, Interpreter, and Build Tool Features that Improve Executable Security
    group: PW
    risk: medium
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: Use compiler, interpreter, and build tool features such as warnings-as-errors, hardened defaults, runtime mitigations, and reproducible build flags to improve the security of executables.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Inventory build configurations and the compiler hardening flags they enable.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify build pipelines that disable hardening features or warnings.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to enable hardening flags and warnings-as-errors.
    evidenceHints:
      - ".cargo/config.toml"
      - "Makefile"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "*.csproj"
      - "tsconfig.json"

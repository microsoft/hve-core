id: nist-ssdf
version: "1.1"
name: NIST Secure Software Development Framework
controls:
  - id: pw-9-1
    title: Configure Software to Have Secure Settings by Default
    group: PW
    risk: medium
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: Configure the default settings of the software so that it is secure out of the box, requiring users to make explicit choices to weaken security rather than to enable it.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Identify default configuration files and documented secure defaults.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify default settings that ship insecurely or require manual hardening.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to flip insecure defaults and document secure baselines.
    evidenceHints:
      - "config/defaults*"
      - ".env.example"
      - "docs/security/secure-defaults*.md"
      - "docs/configuration/**"

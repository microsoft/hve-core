id: nist-ssdf
version: "1.1"
name: NIST Secure Software Development Framework
controls:
  - id: po-3-2
    title: Follow Recommended Security Practices to Deploy and Maintain Tools and Toolchains
    group: PO
    risk: high
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: Deploy, operate, and maintain the tools and toolchains that support secure software development using the practices and configurations recommended by the tool vendors and security guidance.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Inventory development toolchain components and their hardening configuration.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify toolchain components missing recommended hardening or update policies.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to harden or update toolchain configuration.
    evidenceHints:
      - ".github/dependabot.yml"
      - "renovate.json"
      - ".pre-commit-config.yaml"
      - ".github/workflows/*hardening*.yml"
      - ".github/workflows/*toolchain*.yml"

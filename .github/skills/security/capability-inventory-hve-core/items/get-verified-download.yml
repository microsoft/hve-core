id: capability-inventory-hve-core
version: '1.0'
name: "hve-core \u2014 Get-VerifiedDownload.ps1"
source: https://github.com/microsoft/hve-core
description: Verified download utility with SHA-256 hash validation for external tool acquisition
controls:
- id: get-verified-download

id: capability-inventory-hve-core
version: '1.0'
name: "hve-core \u2014 pip-audit"
source: https://github.com/microsoft/hve-core
description: pip-audit.yml reusable workflow for Python dependency vulnerability scanning
controls:
- id: pip-audit
  appliesTo: [cloud, web, ml, fleet]
  title: pip-audit
  description: pip-audit.yml reusable workflow for Python dependency vulnerability scanning
  group: native
  assessmentMethod: categorical
  categories:
  - absent
  - partial
  - present
  - verified
  risk: medium
  gates:
  - id: presence
    phase: assessment
    default: pending
    description: Repository implements the pip-audit capability.
  - id: verification
    phase: gap-analysis
    default: pending
    description: Implementation of pip-audit is verified against reference patterns.
  evidenceHints:
  - .github/workflows/pip-audit*.yml
  references:
  - https://github.com/microsoft/hve-core

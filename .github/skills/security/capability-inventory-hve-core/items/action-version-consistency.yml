id: capability-inventory-hve-core
version: '1.0'
name: "hve-core \u2014 Action version consistency"
source: https://github.com/microsoft/hve-core
description: Test-ActionVersionConsistency.ps1 validates all workflow references use consistent versions
controls:
- id: action-version-consistency
  appliesTo: [cloud, web, ml, fleet]
  title: Action version consistency
  description: Test-ActionVersionConsistency.ps1 validates all workflow references use consistent versions
  group: native
  assessmentMethod: categorical
  categories:
  - absent
  - partial
  - present
  - verified
  risk: medium
  gates:
  - id: presence
    phase: assessment
    default: pending
    description: Repository implements the Action version consistency capability.
  - id: verification
    phase: gap-analysis
    default: pending
    description: Implementation of Action version consistency is verified against reference patterns.
  evidenceHints:
  - scripts/security/Test-ActionVersionConsistency.ps1
  references:
  - https://github.com/microsoft/hve-core

id: capability-inventory-hve-core
version: '1.0'
name: "hve-core \u2014 Dependabot"
source: https://github.com/microsoft/hve-core
description: Dependabot configuration for automated dependency updates
controls:
- id: dependabot
  appliesTo: [cloud, web, ml, fleet]
  title: Dependabot
  description: Dependabot configuration for automated dependency updates
  group: shared
  assessmentMethod: categorical
  categories:
  - absent
  - partial
  - present
  - verified
  risk: medium
  gates:
  - id: presence
    phase: assessment
    default: pending
    description: Repository implements the Dependabot capability.
  - id: verification
    phase: gap-analysis
    default: pending
    description: Implementation of Dependabot is verified against reference patterns.
  mapsTo:
    openssf-scorecard:
    - Dependency-Update-Tool
  evidenceHints:
  - .github/dependabot.yml
  references:
  - https://github.com/microsoft/hve-core

id: cisa-sscm
version: "1.0"
name: CISA Securing the Software Supply Chain
controls:
  - id: deliver-update-channel
    title: Secure Update and Distribution Channel
    group: deliver
    risk: high
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: Software updates and distribution use authenticated, integrity-protected channels with verifiable artifact identity, mitigating CISA SSCM risks of update-channel compromise and rollback or substitution attacks.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Inventory update and distribution channels and capture authentication and integrity controls.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify channels missing transport authentication, integrity verification, or rollback protection.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to harden update channels, add signature verification, or migrate to authenticated registries.
    evidenceHints:
      - ".github/workflows/release*.yml"
      - ".github/workflows/publish*.yml"
      - ".github/workflows/deploy*.yml"
      - "docs/release/**"
      - "docs/distribution/**"
      - "**/update-policy*.md"
    references:
      - https://www.cisa.gov/resources-tools/resources/securing-software-supply-chain-recommended-practices-guide-developers

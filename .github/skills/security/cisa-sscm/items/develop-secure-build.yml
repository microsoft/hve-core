id: cisa-sscm
version: "1.0"
name: CISA Securing the Software Supply Chain
controls:
  - id: develop-secure-build
    title: Hardened, Isolated, Reproducible Build Environment
    group: develop
    risk: critical
    assessmentMethod: categorical
    categories: [absent, partial, present, verified]
    description: Builds run in hardened, isolated, ephemeral environments with least-privilege credentials, controlled tooling, and produce reproducible outputs to mitigate build-system tampering as identified by CISA SSCM.
    gates:
      - id: standards-mapping
        phase: standards-mapping
        default: pending
        description: Inventory build pipelines, runner types, and isolation controls.
      - id: gap-analysis
        phase: gap-analysis
        default: pending
        description: Identify pipelines lacking ephemeral runners, least-privilege tokens, or reproducibility controls.
      - id: backlog-generation
        phase: backlog-generation
        default: pending
        description: Generate work items to harden runners, scope tokens, and adopt reproducible build configurations.
    evidenceHints:
      - ".github/workflows/**"
      - ".gitlab-ci.yml"
      - "**/azure-pipelines*.yml"
      - "**/Jenkinsfile"
      - "**/buildspec*.yml"
      - "**/Dockerfile.build*"
    references:
      - https://www.cisa.gov/resources-tools/resources/securing-software-supply-chain-recommended-practices-guide-developers

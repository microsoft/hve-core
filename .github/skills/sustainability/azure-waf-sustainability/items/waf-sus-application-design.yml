controls:
  - id: waf-sus-application-design
    title: Application Design — minimize compute, storage, and network demand
    description: |
      Choose efficient application architectures: event-driven over polling,
      stateless over stateful where viable, asynchronous batch over chatty
      synchronous calls. Right-size SKUs and instance counts; enable
      autoscale and scale-to-zero where workload tolerates cold start.

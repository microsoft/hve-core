id: of-ado-work-item-template
title: "ADO Work Item Description Template"
itemKind: document-section
audience: ado
format: markdown
phaseHint: phase-6-handoff
summary: "HTML description body for ADO work items generated by the RAI Planner with sections for context, threat, control surface, and acceptance."
tokens:
  - control_name
  - characteristic
  - threat_id
  - threat_description
  - control_surface
  - control_details
  - evidence_status
  - horizon
  - implementation_details
  - criterion_1
  - criterion_2
template: |
  <div>
    <h3>RAI Control: {{control_name}}</h3>
    <p><strong>NIST Characteristic:</strong> {{characteristic}}</p>
    <p><strong>Threat:</strong> {{threat_id}} - {{threat_description}}</p>
    <p><strong>Control Surface:</strong> {{control_surface}} - {{control_details}}</p>
    <p><strong>Evidence:</strong> {{evidence_status}}</p>
    <p><strong>Suggested Remediation Horizon:</strong> {{horizon}}</p>
    <h4>Implementation</h4>
    <p>{{implementation_details}}</p>
    <h4>Acceptance Criteria</h4>
    <ul>
      <li>{{criterion_1}}</li>
      <li>{{criterion_2}}</li>
    </ul>
    <blockquote>
    <p><strong>Note</strong> — The author created this content with assistance from AI. All outputs should be reviewed and validated before use.</p>
    <ul><li><input type="checkbox" disabled /> Reviewed and validated by a qualified human reviewer</li></ul>
    </blockquote>
  </div>
description: |
  Work item ids follow `WI-RAI-{NNN}`. Title prefix is `[RAI] `. Execution
  follows `ado-update-wit-items.instructions.md`.

id: cs-ei-detective
title: "Control Surface: Explainable and Interpretable — Detective"
itemKind: criterion
summary: "Detective controls for the Explainable and Interpretable characteristic: explanation-quality monitoring, faithfulness checks, and user comprehension surveys."
characteristic: explainableInterpretable
controlType: detective
gates:
  - id: impact-assessment
    phase: phase-5-impact-assessment
    default: pending
description: |
  Detective controls observe whether shipped explanations remain useful and
  faithful. Examples include explanation-quality monitoring against a reference
  set, faithfulness checks that verify post-hoc explanations match model
  behavior on perturbed inputs, and user comprehension surveys that confirm the
  explanation actually transfers understanding to the target audience.

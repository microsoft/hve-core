id: tc-bound-feedback
title: "AI Trust Boundary: Feedback"
itemKind: criterion
summary: "Separation between user feedback and model updates. Key threats: feedback manipulation, drift injection, bias amplification."
boundaryType: feedback
kind: boundary
characteristics:
  - fairBiasManaged
  - validReliable
  - accountableTransparent
nistSubcategories:

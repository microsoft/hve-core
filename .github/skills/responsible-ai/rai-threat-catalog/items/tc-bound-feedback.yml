description: |
  Boundary where user feedback signals are admitted into model improvement
  pipelines. Concentrates threats of coordinated feedback manipulation, drift
  injection through targeted feedback patterns, and bias amplification across
  retraining cycles. Typically maps to the DATA and WEBUI security buckets.

description: |
  Queue of automated decisions or outputs routed to human reviewers for
  oversight, escalation, or override. Threats include review bypass,
  automation bias degrading reviewer judgement, accountability gaps, and
  insufficient documentation of human decisions. Typically maps to the
  IDENTITY and WEBUI security buckets.

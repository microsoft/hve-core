id: tc-bound-inference
title: "AI Trust Boundary: Inference"
itemKind: criterion
summary: "Separation between client requests and model processing. Key threats: adversarial inputs, prompt injection, resource exhaustion."
boundaryType: inference
kind: boundary
characteristics:
  - validReliable
  - privacyEnhanced
  - secureResilient
nistSubcategories:

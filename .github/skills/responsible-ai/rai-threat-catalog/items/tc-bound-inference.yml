description: |
  Boundary where untrusted client requests cross into model processing.
  Concentrates threats of adversarial inputs, prompt injection bypassing
  safety filters, jailbreaking, and resource exhaustion via crafted queries.
  Typically maps to the WEBUI and INFRA security buckets.

schemaVersion: "1.0"
collections:
  ado:
    path: collections/ado.collection.yml
    name: Azure DevOps Integration
    display:
      ordering: manual
    intro: Manage Azure DevOps work items, monitor builds, create pull requests, and convert requirements documents into structured work item hierarchies - all from within VS Code.
    tags:
    - azure-devops
    - ado
    - work-items
    - builds
    - pull-requests
    itemCount: 21
    descriptions:
      - channel: stable
        text: 'Azure DevOps work item management, build monitoring, and pull request creation'
      - channel: prerelease
        text: 'Preview: Azure DevOps work item management, build monitoring, and PR creation. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  coding-standards:
    path: collections/coding-standards.collection.yml
    name: Coding Standards
    display:
      ordering: alpha
    intro: Enforce language-specific coding conventions and best practices across your projects, with pre-PR code review agents for catching functional defects early. This collection provides instructions for bash, Bicep, C#, PowerShell, Python, Rust, and Terraform that are automatically applied based on file patterns, plus agents that review branch diffs before opening pull requests.
    tags:
    - coding-standards
    - code-review
    - pull-request
    - quality
    - bash
    - bicep
    - csharp
    - powershell
    - python
    - rust
    - terraform
    - uv
    itemCount: 22
    descriptions:
      - channel: stable
        text: 'Language-specific coding instructions and pre-PR code review agents for bash, Bicep, C#, PowerShell, Python, Rust, and Terraform projects'
      - channel: prerelease
        text: 'Preview & Experimental: Coding standards and pre-PR review agents for seven languages. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  data-science:
    path: collections/data-science.collection.yml
    name: Data Science
    display:
      ordering: manual
    intro: Generate data specifications, Jupyter notebooks, and Streamlit dashboards from natural language descriptions. Evaluate AI-powered data systems against Responsible AI standards. This collection includes specialized agents for data science workflows in Python and RAI assessment.
    caution: The RAI agents and prompts in this collection are **assistive tools only**. They do not replace qualified human review, organizational RAI review boards, or regulatory compliance programs. All AI-generated RAI artifacts **must** be reviewed and validated by qualified professionals before use. AI outputs may contain inaccuracies, miss critical risks, or produce recommendations that are incomplete or inappropriate for your context.
    notice: |
      > [!CAUTION]
      > This collection includes RAI (Responsible AI) agents and prompts that are **assistive tools only**. They do not replace qualified responsible AI review, ethics board oversight, or established organizational RAI governance processes. All AI-generated RAI assessments, impact analyses, and recommendations **must** be reviewed and validated by qualified professionals before use. AI outputs may contain inaccuracies, miss critical risk categories, or produce recommendations that are incomplete or inappropriate for your context.
    tags:
    - data
    - jupyter
    - streamlit
    - dashboards
    - visualization
    - data-science
    - rai
    - responsible-ai
    itemCount: 21
    descriptions:
      - channel: stable
        text: 'Evaluation dataset creation, data specification generation, Jupyter notebooks, and Streamlit dashboards'
      - channel: prerelease
        text: 'Preview & Experimental: Eval datasets, data specs, Jupyter notebooks, and Streamlit dashboards. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  design-thinking:
    path: collections/design-thinking.collection.yml
    name: Design Thinking
    display:
      ordering: alpha
    intro: Coaching identity, quality constraints, and methodology instructions for AI-enhanced design thinking across nine methods. The collection supports the HVE Design Thinking pyramid structure spanning Problem, Solution, and Implementation spaces.
    tags:
    - design-thinking
    - coaching
    - methodology
    - ux
    itemCount: 61
    descriptions:
      - channel: stable
        text: 'Design Thinking coaching identity, quality constraints, and methodology instructions for AI-enhanced design thinking across nine methods'
      - channel: prerelease
        text: 'Preview: Design Thinking coaching identity and methodology across nine methods. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  github:
    path: collections/github.collection.yml
    name: GitHub Backlog Management
    display:
      ordering: manual
    intro: Manage GitHub issue backlogs with agents for discovery, triage, sprint planning, and execution. This collection brings structured backlog management workflows directly into VS Code.
    tags:
    - github
    - issues
    - backlog
    - triage
    - sprint
    itemCount: 14
    descriptions:
      - channel: stable
        text: 'GitHub issue discovery, triage, sprint planning, and backlog execution agents and prompts'
      - channel: prerelease
        text: 'Preview: GitHub issue discovery, triage, sprint planning, and backlog execution. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  hve-core-all:
    path: collections/hve-core-all.collection.yml
    name: HVE Core All
    display:
      ordering: alpha
    intro: |
      HVE Core provides the complete collection of AI chat agents, prompts, instructions, and skills for VS Code with GitHub Copilot. This edition includes every artifact across all domains: development workflows, architecture, Azure DevOps, GitHub and Jira backlog workflows, data science, design thinking, security, and more.

      Use this edition when you want access to everything without choosing a focused collection.
    caution: |
      This collection includes security, responsible AI, and supply chain security agents and prompts that are **assistive tools only**.
      They do not replace professional security tooling (SAST, DAST, SCA, penetration testing, compliance scanners) or qualified human review.
      All AI-generated security and compliance artifacts **must** be reviewed and validated by qualified professionals before use.
      AI outputs may contain inaccuracies, miss critical threats, or produce recommendations that are incomplete or inappropriate for your environment.
    tags:
    - hve
    - complete
    - bundle
    itemCount: 247
    descriptions:
      - channel: stable
        text: 'Full bundle of all HVE Core agents, prompts, instructions, and skills'
      - channel: prerelease
        text: 'Preview & Experimental: Full bundle of all HVE Core agents, prompts, instructions, and skills. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  hve-core:
    path: collections/hve-core.collection.yml
    name: HVE Core Workflow
    display:
      ordering: manual
    intro: HVE Core provides the flagship RPI (Research, Plan, Implement, Review) workflow for completing complex tasks through a structured four-phase process. The RPI workflow dispatches specialized agents that collaborate autonomously to deliver well-researched, planned, and validated implementations. This collection also includes Git workflow prompts for commit messages, merge operations, repository setup, and pull request management.
    tags:
    - workflow
    - hve-core
    - rpi
    - planning
    - research
    - implementation
    - review
    - git
    - commits
    - merge
    - pull-request
    itemCount: 42
    descriptions:
      - channel: stable
        text: 'HVE Core RPI (Research, Plan, Implement, Review) workflow with Git commit, merge, setup, and pull request prompts'
      - channel: prerelease
        text: 'Preview & Experimental: HVE Core RPI workflow with Git commit, merge, setup, and PR prompts. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  project-planning:
    path: collections/project-planning.collection.yml
    name: Project Planning
    display:
      ordering: manual
    intro: Create architecture decision records, requirements documents, and diagrams - all through guided AI workflows. Evaluate AI-powered systems against Responsible AI standards and conduct STRIDE-based security model analysis with automated backlog generation. Includes Jira backlog management workflows for discovery, triage, PRD-to-issue conversion, and execution.
    tags:
    - documentation
    - architecture
    - adr
    - brd
    - prd
    - diagrams
    - planning
    - rai
    - responsible-ai
    - security
    itemCount: 65
    descriptions:
      - channel: stable
        text: 'PRDs, BRDs, ADRs, and architecture diagrams'
      - channel: prerelease
        text: 'Preview & Experimental: PRDs, BRDs, ADRs, and architecture diagrams. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'
  security:
    path: collections/security.collection.yml
    name: Security
    display:
      ordering: manual
    intro: Security review, planning, incident response, risk assessment, vulnerability analysis, supply chain security, and responsible AI assessment for cloud and hybrid environments.
    caution: The security agents and prompts in this collection are **assistive tools only**. They do not replace professional security tooling (SAST, DAST, SCA, penetration testing, compliance scanners) or qualified human review. All AI-generated security artifacts **must** be reviewed and validated by qualified security professionals before use. AI outputs may contain inaccuracies, miss critical threats, or produce recommendations that are incomplete or inappropriate for your environment.
    notice: |
      > [!CAUTION]
      > The security agents and prompts in this collection are **assistive tools only**. They do not replace professional security tooling (SAST, DAST, SCA, penetration testing, compliance scanners) or qualified human review. All AI-generated security artifacts **must** be reviewed and validated by qualified security professionals before use. AI outputs may contain inaccuracies, miss critical threats, or produce recommendations that are incomplete or inappropriate for your environment.
    tags:
    - security
    - incident-response
    - risk
    - planning
    - review
    - vulnerability
    - threat-modeling
    - supply-chain
    - rai
    - responsible-ai
    itemCount: 55
    descriptions:
      - channel: stable
        text: 'Security review, planning, incident response, risk assessment, and vulnerability analysis'
      - channel: prerelease
        text: 'Preview & Experimental: Security review, planning, incident response, and risk assessment. Unstable; may change or be removed without notice. Feedback: github.com/microsoft/hve-core/issues'

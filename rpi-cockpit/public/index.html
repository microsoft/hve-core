<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RPI Cockpit</title>
<style>
  /* ---- VS Code dark (editor-native, default) ---- */
  :root{
    --brand:#0E639C;--brand-hover:#1177BB;--brand-2:#094771;--active:#094771;
    --body-bg:#1E1E1E;
    --layer:#252526;--layer-alt:#2D2D2D;--stroke:#3C3C3C;--stroke-2:#4A4A4A;
    --text:#CCCCCC;--text-2:#9D9D9D;--text-3:#6E6E6E;
    --ok:#73C991;--ok-bg:#16301F;--accent2:#C9A9F0;
    --av-pi-bg:#3A2D4D;--av-pi-fg:#C9A9F0;--av-rs-bg:#16324D;--av-rs-fg:#6FB3E8;
    --accent-cyan:#9CDCFE;--accent-blue:#4FC1FF;
    --fail:#f2b8b5;--fail-bg:#3a1714;--fail-stroke:#5c2622;
    --radius:4px;--radius-sm:3px;
    --shadow-4:0 2px 8px rgba(0,0,0,.36);--shadow-8:0 8px 16px rgba(0,0,0,.45);
    --bar:#323233;--bar-blur:none;
    --rail:#252526;--rail-blur:none;--card-blur:none;
  }
  /* ---- VS Code light (editor-native) ---- */
  html[data-theme="light"]{
    --brand:#005FB8;--brand-hover:#0258A8;--brand-2:#DCEBFC;--active:#005FB8;
    --body-bg:#FFFFFF;
    --layer:#F8F8F8;--layer-alt:#F3F3F3;--stroke:#E5E5E5;--stroke-2:#CECECE;
    --text:#1F1F1F;--text-2:#5A5A5A;--text-3:#8B8B8B;
    --ok:#1A7F37;--ok-bg:#E6F4EA;--accent2:#8250DF;
    --av-pi-bg:#EDE7F6;--av-pi-fg:#6F42C1;--av-rs-bg:#E1EFFB;--av-rs-fg:#0A5BA0;
    --accent-cyan:#0B6BB5;--accent-blue:#005FB8;
    --fail:#B42318;--fail-bg:#FDECEA;--fail-stroke:#F1C9C5;
    --shadow-4:0 1px 3px rgba(0,0,0,.10);--shadow-8:0 6px 16px rgba(0,0,0,.16);
    --bar:#F3F3F3;
    --rail:#F8F8F8;
  }
  *{box-sizing:border-box;margin:0;padding:0;transition:background-color .22s ease,border-color .22s ease,color .14s ease}
  html,body{height:100%}
  body{font-family:'Segoe UI Variable Text','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
    color:var(--text);background:var(--body-bg);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  .topbar{display:flex;align-items:center;gap:14px;height:48px;padding:0 16px;background:var(--bar);
    -webkit-backdrop-filter:var(--bar-blur);backdrop-filter:var(--bar-blur);border-bottom:1px solid var(--stroke);z-index:5}
  .mark{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.2px;color:var(--text)}
  .mark .glyph{width:22px;height:22px;border-radius:6px;background:var(--brand);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-4)}
  .crumb{color:var(--text-2);font-size:12.5px}.crumb b{color:var(--text);font-weight:600}
  .spacer{flex:1}
  .pill{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:12px;font-size:11.5px;font-weight:600;background:var(--ok-bg);color:var(--ok)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.6s ease-in-out infinite;transition:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .host{font-size:11.5px;color:var(--text-2);background:var(--layer);border:1px solid var(--stroke);height:24px;display:inline-flex;align-items:center;padding:0 9px;border-radius:6px}
  .iconbtn{width:30px;height:30px;border-radius:6px;border:1px solid transparent;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--text-2);cursor:pointer}
  .iconbtn:hover{background:var(--layer);border-color:var(--stroke)}

  .main{display:flex;flex:1;min-height:0}
  .rail-left{width:248px;flex:none;padding:14px 12px;border-right:1px solid var(--stroke);background:var(--rail);-webkit-backdrop-filter:var(--rail-blur);backdrop-filter:var(--rail-blur);overflow:auto}
  .rail-title{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);font-weight:600;margin:4px 8px 10px}
  .chipline{display:flex;gap:6px;margin:0 6px 14px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:11px;background:var(--brand-2);color:var(--accent-cyan)}
  .chip.muted{background:var(--layer);color:var(--text-2);border:1px solid var(--stroke)}
  .step{display:flex;gap:11px;padding:9px 8px;border-radius:7px;position:relative}
  .step+.step{margin-top:2px}
  .step .ring{flex:none;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:1.5px solid var(--stroke-2);color:var(--text-3);background:var(--layer)}
  .step.done .ring{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
  .step.active{background:var(--active)}
  .step.active .ring{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:var(--shadow-4)}
  .step.active .lbl,.step.active .sub{color:#fff}
  .step .lbl{font-weight:600;font-size:13px}.step .sub{font-size:11.5px;color:var(--text-2)}
  .step.pending .lbl{color:var(--text-3);font-weight:500}
  .connector{position:absolute;left:19.5px;top:38px;width:2px;height:14px;background:var(--stroke-2)}
  .step.done .connector{background:var(--ok)}
  .substep{margin:8px 0 2px 35px;font-size:11.5px;color:var(--text-2);display:flex;align-items:center;gap:7px}
  .mini{width:6px;height:6px;border-radius:50%;background:var(--brand)}

  .center{flex:1;min-width:0;overflow:auto;padding:18px 22px}
  .h-row{display:flex;align-items:baseline;gap:12px;margin-bottom:3px}
  .h-row h1{font-size:19px;font-weight:600;letter-spacing:.1px}
  .h-row .state{font-size:12px;color:var(--accent-blue);font-weight:600}
  .lead{color:var(--text-2);font-size:12.5px;margin-bottom:18px}
  code{font-family:'Cascadia Code','Segoe UI Mono',ui-monospace,monospace;font-size:11.5px;background:var(--layer-alt);padding:1px 5px;border-radius:4px;border:1px solid var(--stroke)}
  .sec{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);font-weight:600;margin:0 0 9px}
  .card{background:var(--layer);border:1px solid var(--stroke);border-radius:var(--radius);box-shadow:var(--shadow-4);-webkit-backdrop-filter:var(--card-blur);backdrop-filter:var(--card-blur)}
  .sub-card{display:flex;align-items:center;gap:12px;padding:12px 14px}
  .sub-card+.sub-card{border-top:1px solid var(--stroke)}
  .av{width:32px;height:32px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--av-pi-bg);color:var(--av-pi-fg);font-weight:600;font-size:12px}
  .av.rs{background:var(--av-rs-bg);color:var(--av-rs-fg)}
  .sub-card .nm{font-weight:600}.sub-card .meta{font-size:11.5px;color:var(--text-2)}
  .bar{height:5px;border-radius:3px;background:var(--stroke);overflow:hidden;margin-top:6px;width:170px}
  .bar>i{display:block;height:100%;background:var(--brand);border-radius:3px}
  .tagidle{font-size:11px;color:var(--text-3);background:var(--layer-alt);border:1px solid var(--stroke);padding:2px 8px;border-radius:10px}
  .gate{display:flex;gap:10px;margin:16px 0 22px;flex-wrap:wrap}
  .check{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;border:1px solid var(--stroke);background:var(--layer)}
  .check.ok{color:var(--ok);background:var(--ok-bg)}
  .check.run{color:var(--accent-cyan);background:var(--brand-2)}
  .check.wait{color:var(--text-3)}
  .check.fail{color:var(--fail);background:var(--fail-bg);border-color:var(--fail-stroke)}

  .decide{border:1.5px solid var(--brand);border-radius:var(--radius);box-shadow:var(--shadow-8);overflow:hidden;margin-top:6px;background:var(--layer);-webkit-backdrop-filter:var(--card-blur);backdrop-filter:var(--card-blur)}
  .decide-head{background:var(--brand);color:#fff;padding:11px 16px;display:flex;align-items:center;gap:10px}
  .decide-head .t{font-weight:600;font-size:13.5px}.decide-head .s{font-size:11.5px;opacity:.85;margin-left:auto}
  .decide-body{padding:14px 16px}
  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:13px}
  .opt{border:1px solid var(--stroke);border-radius:var(--radius-sm);padding:12px;background:var(--layer-alt);position:relative}
  .opt.rec{border:1.5px solid var(--brand)}
  .opt .badge{position:absolute;top:-9px;left:11px;font-size:10px;font-weight:700;letter-spacing:.4px;background:var(--brand);color:#fff;padding:2px 8px;border-radius:9px}
  .opt h4{font-size:13px;font-weight:600;margin-bottom:5px}.opt p{font-size:11.5px;color:var(--text-2);line-height:1.5}
  .opt .to{margin-top:8px;font-size:11px;color:var(--text-3)}
  .btns{display:flex;gap:9px;align-items:center}
  .btn{height:32px;padding:0 16px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--stroke-2);background:var(--layer);color:var(--text)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-hover)}
  .btn.ghost{color:var(--text-2)}
  .await{margin-left:auto;font-size:11.5px;color:var(--text-3);display:flex;align-items:center;gap:7px}

  #screen{margin-top:6px}
  .screen-frame{border:1px solid var(--stroke);border-radius:var(--radius);background:var(--layer);box-shadow:var(--shadow-4);overflow:hidden}
  #screen-iframe{display:block;width:100%;height:420px;border:0;background:#fff}

  .rail-right{width:300px;flex:none;border-left:1px solid var(--stroke);background:var(--rail);-webkit-backdrop-filter:var(--rail-blur);backdrop-filter:var(--rail-blur);display:flex;flex-direction:column;min-height:0}
  .rr-sec{padding:14px 14px 6px}
  .steer{margin:0 14px 12px;background:var(--layer);border:1px solid var(--stroke);border-radius:var(--radius-sm);padding:11px 12px}
  .steer label{font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .select{margin-top:7px;height:32px;width:100%;border:1px solid var(--stroke-2);border-radius:var(--radius-sm);background:var(--layer);padding:0 10px;font-size:12.5px;color:var(--text);display:flex;align-items:center;justify-content:space-between}
  select.select{appearance:none;-webkit-appearance:none;cursor:pointer}
  textarea#steer-note{margin-top:7px;width:100%;min-height:48px;resize:vertical;border:1px solid var(--stroke-2);border-radius:var(--radius-sm);background:var(--layer);padding:8px 10px;font-family:inherit;font-size:12.5px;color:var(--text)}
  #directives{margin-top:10px}
  #directives .evt{border-bottom:1px dashed var(--stroke)}
  .pill[data-status="offline"]{background:var(--fail-bg);color:var(--fail)}
  .pill[data-status="connecting"]{background:var(--layer);color:var(--text-2)}
  .stream{flex:1;overflow:auto;padding:4px 14px 16px;font-size:11.5px}
  .evt{display:flex;gap:9px;padding:7px 0;border-bottom:1px dashed var(--stroke)}
  .evt .ts{color:var(--text-3);font-variant-numeric:tabular-nums;flex:none;width:38px}
  .evt .k{font-weight:600;color:var(--accent-blue)}
  .evt .k.s2{color:var(--accent2)}.evt .k.ok{color:var(--ok)}.evt .txt{color:var(--text-2)}
  svg{display:block}

  /* Responsive: gracefully collapse the three-column layout on narrower viewports */
  @media (max-width:1180px){
    .rail-left{width:208px}
    .rail-right{width:252px}
    .center{padding:16px 18px}
  }
  @media (max-width:900px){
    .main{flex-direction:column;overflow:auto}
    .rail-left,.center,.rail-right{width:auto;flex:none;min-height:0;overflow:visible}
    .rail-left{border-right:none;border-bottom:1px solid var(--stroke)}
    .rail-right{border-left:none;border-top:1px solid var(--stroke)}
    .stream{flex:none;overflow:visible}
  }
  @media (max-width:640px){
    .topbar{gap:9px;padding:0 12px}
    .crumb,.host{display:none}
    .center{padding:14px 14px}
    .opts{grid-template-columns:1fr}
  }

  #home { display: block; }
  .home-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .brand-mark { font-weight: 500; }
  .welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .welcome-overlay[hidden] { display: none; }
  .welcome-modal { background: var(--layer, #1e1e1e); border: 1px solid var(--stroke, #3a3a3a); border-radius: 12px; padding: 22px 24px; max-width: 440px; box-shadow: 0 12px 48px rgba(0,0,0,.45); }
  .welcome-modal .welcome-text { display: block; font-size: 14px; line-height: 1.55; margin-bottom: 16px; }
  .welcome-x { font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid var(--stroke-2, #4A4A4A); border-radius: 6px; background: var(--accent, #0e639c); color: #fff; padding: 6px 14px; }
  .orient { padding: 12px 14px; border: 1px dashed var(--stroke, #3a3a3a); border-radius: 8px; margin-bottom: 18px; font-size: 13px; }
  .crumb-back { font-size: 12px; font-family: inherit; cursor: pointer; border: 1px solid var(--stroke, #3a3a3a); border-radius: 4px; background: var(--layer, #252526); color: var(--text-2, #9D9D9D); padding: 2px 8px; }
  .crumb-back:hover { border-color: var(--stroke-2, #4A4A4A); color: var(--text, #CCCCCC); }
  .rev-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .rev-target { font-weight: 500; }
  .rev-counts { font-size: 12px; opacity: .7; }
  .sev-group { margin-bottom: 16px; }
  .sev-label { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; opacity: .7; margin-bottom: 6px; }
  .finding { border: 1px solid var(--stroke, #3a3a3a); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .finding-top { display: flex; align-items: baseline; gap: 8px; }
  .finding-title { font-weight: 500; }
  .finding-loc { font-size: 12px; opacity: .6; }
  .finding-detail { font-size: 13px; opacity: .85; margin-top: 6px; white-space: pre-wrap; }
  .sev-critical .sev-label { color: #e26a6a; }
  .sev-high .sev-label { color: #e0954b; }
  #iv-question { border: 1px solid var(--stroke, #3a3a3a); border-radius: 8px; padding: 12px 14px; }
  .iv-prompt { font-weight: 500; margin-bottom: 8px; }
  .iv-input { width: 100%; box-sizing: border-box; min-height: 64px; }
  .iv-send { margin-top: 8px; }
  .iv-empty { opacity: .6; font-size: 13px; }
</style>
<script>
  /* Apply persisted theme before first paint to avoid flash. */
  (function(){
    try{
      var t = localStorage.getItem('rpi-theme');
      if(!t){ t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
      if(t === 'light'){ document.documentElement.setAttribute('data-theme','light'); }
    }catch(e){}
  })();
</script>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="mark"><span class="glyph"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M4 12a8 8 0 1 0 2.3-5.6"/><path d="M4 4v3.5H7.5"/></svg></span>RPI Cockpit</div>
    <div class="crumb"><button id="to-home" class="crumb-back" aria-label="Back to the Navigator home">Home</button><span id="crumb-task">—</span> · <b>RPI session</b></div>
    <div class="spacer"></div>
    <span class="pill" id="conn-pill" data-status="connecting"><span class="dot"></span><span id="conn-label">connecting…</span></span>
    <span class="host" id="host-pill" hidden>via MCP</span>
    <button class="iconbtn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
  </div>

  <div id="welcome" class="welcome-overlay" hidden>
    <div class="welcome-modal">
      <span class="welcome-text">New here? This is HVE Core's home. Pick a workflow to start one, or hover a tile to see what it does.</span>
      <button id="welcome-dismiss" class="welcome-x" aria-label="Dismiss welcome">Got it</button>
    </div>
  </div>

  <div class="main">
    <section id="home" hidden>
      <div class="home-top">
        <div class="brand"><span class="brand-mark">HVE Cockpit</span></div>
        <span id="home-status" class="muted">No loop running</span>
      </div>
      <div id="orient" class="orient"></div>
    </section>

    <section id="loop">
    <div id="rpi-view">
    <aside class="rail-left">
      <div class="rail-title">RPI loop</div>
      <div id="steps"></div>
    </aside>

    <section class="center">
      <div class="h-row"><h1 id="phase-title">RPI session</h1><span class="state" id="phase-state"></span></div>
      <div class="lead" id="lead"></div>

      <div class="sec">Live subagents</div>
      <div class="card" style="margin-bottom:22px">
        <div id="subagents"></div>
      </div>

      <div class="sec">Validation gate</div>
      <div class="gate" id="gate"></div>

      <div id="decision"></div>

      <section id="screen" hidden>
        <div class="sec" id="screen-title">Screen</div>
        <div class="screen-frame"><iframe id="screen-iframe" sandbox title="Agent screen"></iframe></div>
      </section>
    </section>

    <aside class="rail-right">
      <div class="rr-sec"><div class="sec" style="margin:0 0 9px">Steer</div></div>
      <div class="steer">
        <label id="steer-label">Next-phase approach</label>
        <select class="select" id="steer-select"></select>
        <label style="display:block;margin-top:11px">Note to the agent</label>
        <textarea id="steer-note" placeholder="e.g. focus on error paths"></textarea>
        <button class="btn primary" id="steer-send" style="margin-top:8px;width:100%">Queue directive</button>
        <div id="directives"></div>
      </div>
      <div class="rr-sec" style="padding-top:2px"><div class="sec" style="margin:0 0 4px">Activity · AG-UI stream</div></div>
      <div class="stream"></div>
    </aside>
    </div>
    <div id="findings-view" hidden>
      <div class="rev-head">
        <span id="rev-target" class="rev-target"></span>
        <span id="rev-counts" class="rev-counts"></span>
      </div>
      <div id="findings"></div>
    </div>
    <div id="interview-view" hidden>
      <div class="rev-head">
        <span id="iv-doctype" class="rev-target"></span>
      </div>
      <div id="iv-question"></div>
      <iframe id="iv-doc" sandbox="" title="Document preview" style="width:100%;min-height:280px;border:1px solid var(--stroke,#3a3a3a);border-radius:8px;margin-top:14px"></iframe>
    </div>
    </section>
  </div>
</div>
<script>
  /* Light/dark theme toggle, persisted to localStorage. */
  (function(){
    var btn = document.getElementById('theme-toggle');
    if(!btn) return;
    var SUN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
    var MOON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    function isLight(){ return document.documentElement.getAttribute('data-theme') === 'light'; }
    function render(){ btn.innerHTML = isLight() ? MOON : SUN; }
    btn.addEventListener('click', function(){
      if(isLight()){
        document.documentElement.removeAttribute('data-theme');
        try{ localStorage.setItem('rpi-theme','dark'); }catch(e){}
      }else{
        document.documentElement.setAttribute('data-theme','light');
        try{ localStorage.setItem('rpi-theme','light'); }catch(e){}
      }
      render();
    });
    render();
  })();
</script>
<script type="module" src="client.js"></script>
</body>
</html>

    prompt: |
      An existing custom agent needs behavioral improvement without an
      architecture change. Summarize how the `hve-builder` skill handles the
      request from baseline assessment through its final outcome. Include the
      write boundary, decision-critical research routing, required quality
      gates, and terminal outcome vocabulary.
    environment:
      skills:
        - ../../.github/skills/hve-core/hve-builder
    tags:
      category: behavior-conformance
      skill: hve-builder
      shape: knowledge
      advisory: "true"
    graders:
      - type: output-matches
        name: lifecycle-routing
        config:
          pattern: '(?is)(?=.*(?:hve-builder|HVE Builder))(?=.*(?:improve|baseline))'
      - type: output-matches
        name: write-boundary
        config:
          pattern: '(?i)(write\s+boundary|approved\s+(target|artifact|path|scope))'
      - type: output-matches
        name: required-gates
        config:
          pattern: '(?is)(?=.*(?:static\s+review|review))(?=.*behavior)(?=.*validat)'
      - type: output-matches
        name: terminal-outcomes
        config:
          pattern: '(?is)(?=.*\bPass\b)(?=.*\bRevise\b)(?=.*\bDeferred\b)(?=.*\bBlocked\b)'
      - type: output-matches
        name: research-routing
        config:
          pattern: '(?is)(?=.*rpi-research)(?=.*(?:bridge|research\s+artifact|evidence\s+root|Deferred))'
  - name: skill-hve-builder-bounded-read-routing
    prompt: |
      I supplied one known custom-agent target, its requirements, and the
      canonical references needed to improve it. Before baseline review, should
      HVE Builder run a workspace research scan? Explain the routing boundary.

        name: bounded-read-route
        config:
          pattern: '(?is)(?=.*(?:known|supplied).{0,80}(?:target|reference))(?=.*(?:bounded|local).{0,80}(?:read|lifecycle))'
      - type: output-matches
        name: no-unnecessary-research
        config:
          pattern: '(?is)(?=.*(?:do\s+not|does\s+not|no\s+need|without).{0,100}(?:activate|invoke|run).{0,40}rpi-research)'

# Per-agent stimulus partial for the `task-researcher` agent slug.
# The generator (scripts/evals/Build-AgentBehaviorSpec.ps1) injects
# `tags.agent: task-researcher` from this file name; do not add it here.
stimuli:
  - name: task-researcher-produces-research-writeup
    prompt: |
      You are operating in an isolated sandbox with no repository checked out and
      no subagents available. Do not attempt to clone, create, or set up a
      repository, and do not delegate to subagents. Using only the notes provided
      below, synthesize a structured research writeup.

      Notes to synthesize (npm scripts that validate markdown in a repository):
      - `npm run lint:md` runs markdownlint across all Markdown files.
      - `npm run lint:md-links` checks Markdown for broken links.
      - `npm run lint:frontmatter` validates YAML frontmatter against schemas.

      Produce a structured writeup covering each script, what it validates, and
      where it is wired into the codebase (the package.json scripts section).
      Write your research file under `.copilot-tracking/research/` and tell me the
      path you wrote it to. Limit the work to one pass.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: structured-writeup
        config:
          pattern: '(?i)(finding|summary|writeup|section|where|wired|location)'
      - type: output-matches
        name: tracking-file-write
        config:
          pattern: '(?i)\.copilot-tracking[-/\\]research'
      - type: output-matches
        name: topic-coverage
        config:
          pattern: '(?i)(npm|script|lint|markdown|validate)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|\.go|\.rs|\.java)'
          negate: true

  - name: task-researcher-lane-fanout
    prompt: "For a medium-hard codebase research request that asks for comprehensive research, describe which named research lanes Task Researcher should launch, whether they can run in parallel, and when Web Search Researcher joins the fan-out."
    tags:
      advisory: "true"
      category: agent-behavior
    graders:
      - type: output-matches
        name: launches-named-lanes-in-parallel
        config:
          pattern: "(?i)parallel|concurrent|simultaneously|at the same time"
      - type: output-matches
        name: names-codebase-locator
        config:
          pattern: "(?i)codebase locator"
      - type: output-matches
        name: names-codebase-analyzer
        config:
          pattern: "(?i)codebase analyzer"
      - type: output-matches
        name: names-codebase-pattern-finder
        config:
          pattern: "(?i)codebase pattern finder"
      - type: output-matches
        name: web-search-is-conditional
        config:
          pattern: "(?i)web search researcher.{0,80}(external|documentation|api|sdk|framework|current facts|needed)|external.{0,80}web search researcher"

  - name: task-researcher-focused-mode
    prompt: "For a simple local-only task with one focused research gap, describe the lightest research mode Task Researcher should use."
    tags:
      advisory: "true"
      category: agent-behavior
    graders:
      - type: output-matches
        name: avoids-lane-fanout
        config:
          pattern: "(?i)avoid.{0,20}(lane|fan.out|parallel)|direct.research|focused|single|one.{0,10}(run|subagent)"
      - type: output-matches
        name: names-light-mode
        config:
          pattern: "(?i)direct|focused|light|single|minimal"

  - name: task-researcher-generic-subagent
    prompt: "Explain whether Task Researcher should create separate named locator, analyzer, pattern finder, and web search researcher subagents for lane-enabled research."
    tags:
      advisory: "true"
      category: agent-behavior
    graders:
      - type: output-matches
        name: names-named-subagents
        config:
          pattern: "(?i)codebase locator|codebase analyzer|codebase pattern finder|web search researcher"

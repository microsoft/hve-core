stimuli:
  - name: supply-chain-skill-assessor-posture
    prompt: |
      As the supply-chain skill assessor, assess a repository's supply-chain
      posture against the `supply-chain-security` skill. Given a codebase
      profile that has no SBOM, unpinned GitHub Actions, and no OpenSSF
      Scorecard workflow, return structured findings with a status and severity
      for each gap.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: supply-chain-vocabulary
        config:
          pattern: '(?i)(supply[- ]chain|scorecard|SLSA|SBOM|sigstore|pinned|provenance|finding)'
      - type: output-matches
        name: status-or-severity-vocabulary
        config:
          pattern: '(?i)(PASS|FAIL|PARTIAL|NOT_ASSESSED|critical|high|medium|low|severity|status)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true

stimuli:
  - name: code-review-class-recipe
    prompt: |
      Review this diff and produce findings with severity:
      ```diff
      -def get_user(user_id):
      -    return db.query(f"SELECT * FROM users WHERE id = {user_id}")
      +def get_user(user_id):
      +    return db.query("SELECT * FROM users WHERE id = ?", user_id)
      ```

    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: findings-table-present
        config:
          pattern: '(?i)(\|.*severity.*\||finding|issue|concern|recommendation|violation)'
      - type: output-matches
        name: severity-vocab
        config:
          pattern: '(?i)(critical|high|medium|low|info|severity|warning)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true

  # Skill merge behavior for issue #1901. These stimuli assert the coding-
  # standards merge contract through the parent Code Review matrix slug.
  - name: code-review-standards-merge-happy-no-conflict
    prompt: |
      As the standards code-review perspective, evaluate this merge-policy
      scenario. Treat the inline skill summaries below as the discovered
      candidate set; do not inspect or rely on real workspace skill files.

      Two distinct skills are available for this Python change:

      Skill A (hve-core baseline) has name python-foundational and requires
      public functions to declare type hints.
      Skill B (repository, .github/skills/) has name python-enterprise and
      requires every request handler to include a correlation_id in its log
      calls.

      Review this diff. The two skills do not overlap or contradict. For every
      finding, cite the exact skill name that surfaced it. Apply both skills.

      ```python
      def handle_request(payload):
          log.info("processing")
          return payload
      ```

    tags:
      category: agent-behavior
      advisory: "true"
      scenario: merge-no-conflict
    graders:
      - type: output-matches
        name: both-distinct-skills-cited
        config:
          pattern: '(?is)(python-foundational.*python-enterprise|python-enterprise.*python-foundational)'
      - type: output-matches
        name: findings-trace-to-skill
        config:
          pattern: '(?i)(skill|python-foundational|python-enterprise)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true
  - name: code-review-standards-merge-name-collision
    prompt: |
      As the standards code-review perspective, evaluate this merge-policy
      scenario. Treat the inline skill summaries below as the discovered
      candidate set; do not inspect or rely on real workspace skill files.

      Two skills share the same name "python-foundational":

      Version 1 (hve-core baseline, packaged under skills/) requires
      Google-style docstrings.
      Version 2 (repository, .github/skills/) requires NumPy-style docstrings.

      Their checks differ but do not otherwise contradict. State which single
      version you load and why, then review the diff accordingly. Do not load or
      apply both copies of the same-named skill. The active repository check is
      the NumPy-style docstring requirement.

      ```python
      def compute(x):
          return x * 2
      ```

    tags:
      category: agent-behavior
      advisory: "true"
      scenario: merge-name-collision
    graders:
      - type: output-matches
        name: repository-version-takes-precedence
        config:
          pattern: '(?i)(repository|repo|\.github/skills|customer|version\s*2)'
      - type: output-matches
        name: single-copy-loaded-baseline-shadowed
        config:
          pattern: '(?i)(precedence|override|shadow|dedup|suppressed|not\s+loaded|not\s+load|not\s+both|only\s+one|single\s+(copy|version)|one\s+(copy|version))'
      - type: output-matches
        name: repository-check-applied
        config:
          pattern: '(?i)numpy'
  - name: code-review-standards-merge-content-contradiction
    prompt: |
      As the standards code-review perspective, evaluate this merge-policy
      scenario. Treat the inline skill summaries below as the discovered
      candidate set; do not inspect or rely on real workspace skill files.

      Two differently named skills are available and their checks contradict
      each other:

      The hve-core baseline skill has name python-foundational and requires
      httpx for HTTP clients; it says not to use requests.
      The repository skill under .github/skills/ has name python-legacy and
      requires requests for HTTP clients as an internal standard.

      Review the diff and report standards findings. Explain how you handle the
      contradiction between the two skills.

      ```python
      import requests
      def fetch(url):
          return requests.get(url).json()
      ```

    tags:
      category: agent-behavior
      advisory: "true"
      scenario: merge-content-contradiction
    graders:
      - type: output-matches
        name: both-contradicting-skills-surfaced
        config:
          pattern: '(?is)(python-foundational.*python-legacy|python-legacy.*python-foundational)'
      - type: output-matches
        name: contradiction-acknowledged
        config:
          pattern: '(?i)(contradict|conflict|disagree|inconsistent|tension|both\s+skills|differ)'
      - type: output-matches
        name: no-silent-arbitration
        config:
          pattern: '(?i)(defer|human|reviewer|surface\s+both|both\s+findings|not\s+\S{0,20}(arbitrate|arbitration|arbitrating|resolve|resolved|resolving|decide|decided|deciding)|cannot\s+\S{0,20}(arbitrate|arbitration|arbitrating|resolve|resolved|resolving|decide|decided|deciding)|author\S{0,20}\s+(smell|mistake|fix|issue))'

  # Origin-precedence and stacking coverage for the Workspace/User/Bundled
  # skill-discovery revision (issue #1901). These assert the "Resolve
  # duplicates" and "Load stacked skills" rules of the coding-standards
  # subagent through the parent Code Review matrix slug.
  - name: code-review-standards-user-tier-precedence
    prompt: |
      As the standards code-review perspective, evaluate this merge-policy
      scenario. Treat the inline skill summaries below as the discovered
      candidate set; do not inspect or rely on real workspace skill files.

      Two skills share the same name "python-foundational", and no Workspace
      copy is present:

      Candidate A comes from a User-profile skill root (~/.copilot/skills/
      coding-standards/) and requires public functions to declare type hints.
      Candidate B is a Bundled extension skill (packaged plugin under
      skills/coding-standards/) and forbids type-hint annotations.

      Their checks differ. Given the Workspace > User > Bundled origin
      precedence, state which single copy you load and why, then review the
      diff. Do not load or apply both copies of the same-named skill. The
      User-profile check (type hints required) is the one that must apply.

      ```python
      def compute(x):
          return x * 2
      ```

    tags:
      category: agent-behavior
      advisory: "true"
      scenario: merge-user-tier-precedence
    graders:
      - type: output-matches
        name: user-tier-takes-precedence
        config:
          pattern: '(?i)(user[-\s]?profile|user\s+(origin|tier|copy|version)|~/\.copilot|\.copilot/skills)'
      - type: output-matches
        name: single-copy-loaded-bundled-shadowed
        config:
          pattern: '(?i)(precedence|override|shadow|dedup|suppressed|not\s+loaded|not\s+load|not\s+both|only\s+one|single\s+(copy|version)|one\s+(copy|version))'
      - type: output-matches
        name: user-check-applied
        config:
          pattern: '(?i)(type\s?hint|annotation)'
  - name: code-review-standards-unknown-origin-dedup
    prompt: |
      As the standards code-review perspective, evaluate this merge-policy
      scenario. Treat the inline skill summaries below as the discovered
      candidate set; do not inspect or rely on real workspace skill files.

      Two skills are available and both are named "python-foundational", but
      neither candidate carries a source label or path, so their origin cannot
      be determined and neither can be ranked as Workspace, User, or Bundled.
      Their checks differ.

      Explain how you resolve this duplicate. Load only one same-named skill,
      do not merge or combine the two bodies, and note the ambiguous duplicate
      in your summary.

      ```python
      def compute(x):
          return x * 2
      ```

    tags:
      category: agent-behavior
      advisory: "true"
      scenario: merge-unknown-origin-dedup
    graders:
      - type: output-matches
        name: single-copy-no-merge
        config:
          pattern: '(?i)(only\s+one|single\s+(copy|version)|one\s+(copy|version)|do\s+not\s+merge|not\s+merge|without\s+merging|not\s+combine|no\s+merg)'
      - type: output-matches
        name: ambiguous-duplicate-noted
        config:
          pattern: '(?i)(ambig|unknown\s+origin|cannot\s+determine|undetermined|indeterminate|unclear\s+(origin|source)|flag|note)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true
  - name: code-review-standards-stacked-coverage
    prompt: |
      As the standards code-review perspective, evaluate this coverage
      scenario. Treat the inline skill summaries below as the discovered
      candidate set; do not inspect or rely on real workspace skill files.

      The change touches two file groups: a Python file (.py) and a Bash
      script (.sh). Three distinct skills are available:

      Skill python-foundational matches Python by name and covers the .py file.
      Skill bash-standards matches Bash by name and is the only candidate that
      covers the .sh file.
      Skill general-style matches only by a broad description and overlaps the
      Python coverage already provided by python-foundational.

      Select the skills to load so every changed file group is covered. Keep
      the only match for a group even when it is the sole candidate, and drop
      description-only matches that cover no otherwise-uncovered group. State
      which skills you load and which you drop.

      ```text
      # app.py and deploy.sh both changed
      ```

    tags:
      category: agent-behavior
      advisory: "true"
      scenario: stacked-coverage
    graders:
      - type: output-matches
        name: group-skills-stacked
        config:
          pattern: '(?is)(python-foundational.*bash-standards|bash-standards.*python-foundational)'
      - type: output-matches
        name: only-match-retained
        config:
          pattern: '(?i)(bash-standards|bash|\.sh)'
      - type: output-matches
        name: description-only-dropped
        config:
          pattern: '(?i)(general-style|drop|deprioriti|exclud|skip|redundant|already\s+covered|description[-\s]only)'

stimuli:
  - name: prompt-evaluator-sandbox-execution-log
    prompt: |
      Evaluate the prompt file `.github/prompts/example.prompt.md` after run 002
      using the execution log in
      `.copilot-tracking/sandbox/2026-05-27-example-prompt-002/execution-log.md`.
      Produce an evaluation-log.md with severity-graded findings against the
      applicable Quality Criteria in `hve-builder.instructions.md`.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: sandbox-and-evaluation-log
        config:
          pattern: '(?i)(\.copilot-tracking[-/\\]sandbox|evaluation[-_]?log|execution[-_]?log)'
      - type: output-matches
        name: criteria-vocabulary
        config:
          pattern: '(?i)(quality[- ]?criteria|severity|finding|hve[- ]?builder)'

  - name: prompt-evaluator-criteria-checklist
    prompt: |
      As a prompt-evaluator subagent, describe how you apply the Quality
      Criteria from `hve-builder.instructions.md` and the style standards from
      `writing-style.instructions.md` to a target prompt file, and how
      pass/fail assessments are recorded with evidence.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: instructions-references
        config:
          pattern: '(?i)(hve-builder|writing-style|\.instructions\.md)'
      - type: output-matches
        name: assessment-vocabulary
        config:
          pattern: '(?i)(checklist|pass|fail|evidence|criteria|category)'

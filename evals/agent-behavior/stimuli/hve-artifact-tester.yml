stimuli:
  - name: hve-artifact-tester-read-only-simulation
    prompt: As the HVE Artifact Tester, simulate one request to create a two-key `.yml` file using the first `copilot-instructions.md` or `AGENTS.md` file you find. Return a read-only trace for the tester skill lead, labeling the file creation as emulated and reporting Complete, Partial, or Blocked.
    environment:
      files:
        - src: fixtures/hve-artifact-copilot-instructions.md
          dest: .github/copilot-instructions.md
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: emulated-write
        config:
          pattern: '(?i)\b(?:emulated|simulated)\b'
      - type: output-matches
        name: execution-summary
        config:
          pattern: '(?i)\b(?:Complete|Partial|Blocked)\b'
      - type: output-matches
        name: trace-owned-by-lead
        config:
          pattern: '(?i)(?:returned\s+trace|tester\s+skill\s+lead|lead\s+to\s+persist)'

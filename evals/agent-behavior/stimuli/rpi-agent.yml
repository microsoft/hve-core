stimuli:
  - name: rpi-agent-class-recipe
    prompt: |
      Coach me through starting an RPI workflow for adding a "feature flags" service. Outline the research, planning, and implementation phases. Write the state under `.copilot-tracking/` and report the path.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: phase-marker-present
        config:
          pattern: '(?im)(^\s*(#{2,3}\s|step\s+\d+|phase\s+\d+|\d+[.)])|\|\s*\d+\s*[—–-]|\bphases?\b)'
      - type: output-matches
        name: tracking-file-write
        config:
          pattern: '(?i)\.copilot-tracking[-/\\]'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true

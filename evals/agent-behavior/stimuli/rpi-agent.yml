stimuli:
  - name: rpi-agent-class-recipe
    prompt: |
      Research evidence for this task is sufficient. The current lifecycle
      routes planning through the `rpi-plan` skill, not the `rpi-planner` phase
      subagent. Do not call tools. Return exactly `rpi-plan`.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: planning-route
        config:
          pattern: '(?i)^\s*[''"]?rpi-plan[''"]?[.!]?\s*$'

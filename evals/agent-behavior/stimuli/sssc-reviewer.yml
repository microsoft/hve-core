stimuli:
  - name: sssc-reviewer-class-recipe
    prompt: |
      Review the software supply chain security posture of a repository that publishes container images and npm packages from a GitHub Actions pipeline. Summarize the findings with severity, citing the relevant frameworks (OpenSSF Scorecard, SLSA, or Sigstore). Write the report under `.copilot-tracking/sssc-reviews/` and report the path.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: findings-table-present
        config:
          pattern: '(?i)(\|.*severity.*\||finding|issue|concern|recommendation|risk)'
      - type: output-matches
        name: severity-vocab
        config:
          pattern: '(?i)(critical|high|medium|low|info|severity|warning)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true

  - name: sssc-reviewer-drafts-openvex-statement
    prompt: |
      You are operating in an isolated sandbox with no repository checked out and
      no subagents available. Do not attempt to clone, create, or set up a
      repository, and do not delegate to subagents. Using only the finding
      provided below, synthesize a VEX assessment and draft an OpenVEX statement.

      Finding to assess:
      - CVE-2026-00000 affects the dependency pkg:npm/example@1.2.3.
      - The vulnerable function is never imported or called anywhere in the product.
      - CVSS base score 7.5 (High).

      Produce a structured VEX writeup: state the OpenVEX status you would draft,
      its justification code, and the supporting evidence. If reachability cannot
      be established from the notes, draw `under_investigation` rather than
      `not_affected`. Write the OpenVEX document under
      `security/vex/hve-core.openvex.json` and report the path. Limit the work to
      one pass.
    tags:
      category: agent-behavior
      skill: vex
      prompt: vex-implement
      instruction: vex-generation
    graders:
      - type: output-matches
        name: structured-writeup
        config:
          pattern: '(?i)(openvex|vex status|justification|statement|evidence|summary)'
      - type: output-matches
        name: topic-coverage
        config:
          pattern: '(?i)(not_affected|under_investigation|vulnerable_code_not_in_execute_path|cve-2026-00000|reachable|reachability)'
      - type: output-matches
        name: vex-document-write
        config:
          pattern: '(?i)(security[-/\\]vex|hve-core\.openvex\.json)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|\.go|\.rs|\.java)'
          negate: true

  - name: sssc-reviewer-vex-standards-conformance
    prompt: |
      You are operating in an isolated sandbox with no repository checked out and
      no subagents available. Do not attempt to clone, create, or set up a
      repository, and do not delegate to subagents.

      Review the following draft OpenVEX statement for conformance to OpenVEX
      document standards and explain what would need to change before it could be
      merged into `security/vex/hve-core.openvex.json`:

      - vulnerability name: CVE-2026-11111
      - status: not_affected
      - justification: (missing)
      - product: pkg:npm/example@4.5.6

      Identify which required fields are present or missing, state whether the
      status/justification pairing is valid, and describe the author-of-record
      and document-mutation expectations. Do not modify any source files. Limit
      the work to one pass.
    tags:
      category: agent-behavior
      instruction: vex-standards
    graders:
      - type: output-matches
        name: standards-vocabulary
        config:
          pattern: '(?i)(justification|status|required field|author|timestamp|@id|not_affected|under_investigation)'
      - type: output-matches
        name: conformance-focus
        config:
          pattern: '(?i)(missing|required|invalid|conform|standard|must|should)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|\.go|\.rs|\.java)'
          negate: true

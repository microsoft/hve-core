stimuli:
  - name: plan-validator-discrepancy-log
    prompt: |
      Validate the implementation plan at `.copilot-tracking/plans/example.md`
      against the research document at `.copilot-tracking/research/example.md`.
      Update only the Discrepancy Log section in the Planning Log with DR-
      and DD- prefixed entries, and report your validation status.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: discrepancy-log-vocabulary
        config:
          pattern: '(?i)(discrepancy log|DR-\d|DD-\d|unaddressed research|plan deviation)'
      - type: output-matches
        name: planning-log-path
        config:
          pattern: '(?i)(planning log|\.copilot-tracking[-/\\]plans)'

  - name: plan-validator-coverage-matrix
    prompt: |
      As a plan-validator subagent, describe how you build an internal coverage
      matrix that maps each research requirement to plan steps (Covered, Partial,
      Missing) and which findings are written to the Planning Log versus returned
      only in the chat response.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: coverage-vocabulary
        config:
          pattern: '(?i)(coverage matrix|covered|partial|missing|requirement)'
      - type: output-matches
        name: severity-or-internal-vocabulary
        config:
          pattern: '(?i)(critical|major|minor|internal|response|chat)'

  - name: plan-validator-acceptance-criteria-coverage
    prompt: |
      Validate this implementation plan against its research and the source
      ticket's acceptance criteria, then report your findings and validation
      status.

      Ticket acceptance criteria:
      1. A user can export the current report view to a CSV file.
      2. The exported CSV includes every column visible under the current filter.
      3. Performance is noticeably better than before.

      Plan summary: adds an "Export CSV" button that downloads the rows currently
      shown on screen. The plan does not mention column selection or any
      performance work.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: ac-coverage-entries
        config:
          pattern: '(?im)(\bAC-0*\d+\b|acceptance\s+criteria\s+coverage)'
      - type: output-matches
        name: needs-clarification-status
        config:
          pattern: '(?i)needs\s+clarification'
      - type: output-matches
        name: planning-log-delta-line
        config:
          pattern: '(?im)(AC-|DR-|DD-|RI-)\S*\s*(items?\s*)?(added|updated|removed)|(added|updated|removed)\b.*\b(AC-|DR-|DD-|RI-)'
      - type: output-matches
        name: planning-log-path
        config:
          pattern: '(?i)(planning log|\.copilot-tracking[-/\\]plans)'

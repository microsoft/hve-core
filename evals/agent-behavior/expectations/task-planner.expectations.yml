# Bucket-A expectations for task-planner
# Format: per-agent YAML, 5–10 grader-worthy expectations grounded in the agent
# file's explicit promises and/or current matrix failures. This file is consumed
# by the next pass that rewrites stimuli + graders end-to-end; do not treat it
# as a Vally grader file directly.
slug: task-planner
class: planner-coach
agent_file: .github/agents/hve-core/task-planner.agent.md
stimulus_file: evals/agent-behavior/stimuli/task-planner.yml
latest_result: evals/results/agent-matrix/2026-05-28/task-planner.json
source_review_date: 2026-05-28

expectations:

  - expectation_id: plan-and-phase-details-under-tracking
    summary: Planning produces an ordinary dated Markdown plan and a matching phase-details artifact.
    signal: Output names paths matching `.copilot-tracking/plans/<YYYY-MM-DD>/<slug>-plan.md` and `.copilot-tracking/details/<YYYY-MM-DD>/<slug>-phase-details.md`.
    pass_criteria: |
      Both paths are workspace-relative and use dated subdirectories. The plan
      ends in `-plan.md`, and the matching details artifact ends in
      `-phase-details.md`.
    failure_modes:
      - Plan written outside the workspace tracking subtree in the current tracking-file-write failure.
      - Missing date subdir, `-plan.md` suffix, or matching phase-details path.
      - Plan path given as absolute filesystem path rather than workspace-relative.
    priority: high
    contract_ref: "rpi-plan artifact contract and `.copilot-tracking/` conventions"

  - expectation_id: stable-identifiers-and-markers
    summary: Plan and phase details use stable task, phase, and task IDs with contextual markers.
    signal: Output uses a task ID, `Pxx`, `Pxx-Txx`, and matching `rpi:phase` and `rpi:task` markers.
    pass_criteria: |
      The plan and phase-details artifact use one stable task ID. Each phase
      is identified as `Pxx` and each task as `Pxx-Txx`; markers such as
      `<!-- rpi:phase id=P01 -->` and `<!-- rpi:task id=P01-T01 -->` appear
      immediately before matching headings.
    failure_modes:
      - IDs or markers are absent or mismatch their headings.
      - Navigation depends on mutable location data rather than identifiers and markers.
    priority: high
    contract_ref: "RPI identity and marker conventions"

  - expectation_id: phase-and-step-structure
    summary: Output presents implementation work organized as stable phases and tasks.
    signal: Output contains `Pxx` phase headings and `Pxx-Txx` task headings.
    pass_criteria: |
      Output contains at least one `Pxx` phase heading and one matching
      `Pxx-Txx` task heading with observable expected results or completion
      evidence. The phase-details artifact supplies context and validation
      expectations for the same IDs.
    failure_modes:
      - Plan presents flat tasks without stable phase and task IDs.
      - Details do not cover the plan's IDs.
    priority: high
    contract_ref: "rpi-plan templates (implementation plan and phase details)"

  - expectation_id: evidence-readiness-and-conditional-research
    summary: Planning reuses supplied or complete evidence and activates research only for a demonstrated readiness gap.
    signal: Output names the evidence assessed and either states readiness or identifies a specific gap that requires research.
    pass_criteria: |
      The planner assesses supplied context, completed research, decisions,
      dependencies, and acceptance criteria. It does not activate research
      merely because no research artifact is attached; it activates research
      only when a demonstrated planning-readiness gap remains.
    failure_modes:
      - Automatically requires research despite adequate supplied evidence.
      - Declares readiness while a decision-critical gap is not recorded.
    priority: medium
    contract_ref: "rpi-plan Flow and Success criteria"

  - expectation_id: critique-gate-routing
    summary: Planning records independent generic fresh-context critique without a fixed worker allowlist.
    signal: Output names a plan critique path and routes a fresh generic critique through `rpi-plan-critique`.
    pass_criteria: |
      Planning names `.copilot-tracking/reviews/plans/<YYYY-MM-DD>/<slug>-plan-critique.md`
      and records a Pass, Revise, or Blocked disposition. The critique route is
      generic and fresh-context, rather than limited to a fixed worker list.
    failure_modes:
      - No critique disposition before implementation handoff.
      - Fixed critique-worker allowlist or retired validation worker is required.
    priority: medium
    contract_ref: "rpi-plan Flow, critique requirements, and Handoff"

  - expectation_id: no-source-modifications
    summary: Planning-only — no edits to source code or build manifests.
    signal: Output does not reference modifications to source-tree files.
    pass_criteria: |
      No occurrences of edit/create verbs paired with `.cs`/`.py`/`.ts`/`.js`/
      `.go`/`.rs`/`.java`/`package.json`/`pyproject.toml`/`Cargo.toml` paths.
      Filenames may appear inside the planned checklist as targets to modify
      later, but not as files this agent itself edited.
    failure_modes:
      - Claims to edit source files during planning.
      - Modifies `package.json` while planning (e.g., adding scripts).
    priority: high
    contract_ref: "Task Planner Constraints (planning-only; no source changes)"

  - expectation_id: planning-handoff-artifacts
    summary: Planning handoff names the plan, phase details, critique, readiness, unresolved decisions, and recommended next stage.
    signal: Output identifies each durable planning artifact and implementation handoff state.
    pass_criteria: |
      Completion identifies the plan, phase-details, and critique paths;
      planning readiness; unresolved decisions; and the recommended next
      RPI stage. Normal implementation handoff names the expected changes path.
    failure_modes:
      - Handoff omits a matching artifact or unresolved decision.
      - Handoff omits the stable artifact and marker contract.
    priority: medium
    contract_ref: "rpi-plan Handoff"
    applies_when: "Planning reaches completion; not for clarification-only turns."

  - expectation_id: plain-text-tracking-paths
    summary: Tracking file references use plain-text workspace-relative paths, not markdown links.
    signal: Paths under `.copilot-tracking/` appear as bare text, not wrapped in `[...]( ... )` or `#file:` directives.
    pass_criteria: |
      Every `.copilot-tracking/` path in the output appears as plain text or
      inside a code span/fence; none is wrapped in a markdown link target or
      `#file:` directive.
    failure_modes:
      - Plan path rendered as `[plan](./.copilot-tracking/plans/...)`.
      - Path written as `#file:.copilot-tracking/...`.
    priority: medium
    contract_ref: "agent §File Path Conventions (plain-text workspace-relative paths; no markdown links or #file: directives for local files)"

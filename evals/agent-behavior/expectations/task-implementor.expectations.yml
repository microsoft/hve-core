# Bucket-A expectations for task-implementor
# Format: per-agent YAML, 5–10 grader-worthy expectations grounded in the agent
# file's explicit promises and/or current matrix failures. This file is consumed
# by the next pass that rewrites stimuli + graders end-to-end; do not treat it
# as a Vally grader file directly.
slug: task-implementor
class: code-implementor
agent_file: .github/agents/hve-core/task-implementor.agent.md
stimulus_file: evals/agent-behavior/stimuli/task-implementor.yml
latest_result: evals/results/agent-matrix/2026-05-28/task-implementor.json
source_review_date: 2026-05-28

expectations:
  - expectation_id: direct-rpi-implement-execution
    summary: Implementation activates `rpi-implement` and performs approved work directly.
    signal: Output identifies `rpi-implement` and records direct execution for the approved phase or task scope.
    pass_criteria: |
      Output resolves the approved plan, phase details, critique disposition,
      amendments, and prior changes record, then executes coupled or small
      approved work directly. A generic bounded subagent is optional only when
      an isolated task materially benefits from context isolation; no fixed
      execution-worker allowlist is required.
    failure_modes:
      - Requires fixed executor delegation before implementation can begin.
      - Performs work outside the approved scope without an amendment or follow-up.
    priority: high
    contract_ref: "Task Implementor and rpi-implement Flow"

  - expectation_id: marker-based-scope-resolution
    summary: Implementation resolves the requested phase or task through stable IDs, markers, and headings.
    signal: Output identifies the plan and phase-details artifacts and uses `Pxx` or `Pxx-Txx` scope references.
    pass_criteria: |
      Output resolves `.copilot-tracking/plans/<YYYY-MM-DD>/<slug>-plan.md`
      and `.copilot-tracking/details/<YYYY-MM-DD>/<slug>-phase-details.md`,
      then locates the requested `Pxx` phase or `Pxx-Txx` task through matching
      headings and `rpi:phase` or `rpi:task` markers. It names exact target
      files and evidence through stable artifact context.
    failure_modes:
      - Uses mutable location data rather than markers and headings to locate work.
      - Executes a different phase, task, or source target without evidence.
    priority: high
    contract_ref: "rpi-implement Flow and RPI marker conventions"

  - expectation_id: task-checklist-and-change-evidence
    summary: Completed plan work has checklist and `CHG-xxx` evidence.
    signal: Output identifies completed `Pxx` or `Pxx-Txx` work and related `CHG-xxx` entries with exact affected files and completion evidence.
    pass_criteria: |
      A phase or task is checked complete only after supporting completion
      evidence exists. Material work is recorded in the changes record as a
      `CHG-xxx` entry that names the related `Pxx` or `Pxx-Txx` task, affected
      files, actual change, completion evidence, and validation state.
    failure_modes:
      - Marks a plan task complete before evidence exists.
      - Reports source edits without a `CHG-xxx` record or exact target evidence.
    priority: high
    contract_ref: "rpi-implement Success criteria and changes-log template"
    applies_when: "Approved implementation work is performed."

  - expectation_id: validation-evidence-or-explicit-skip
    summary: Changed behavior has validation evidence or an explicit skip reason.
    signal: Output records expected validation checks, results, and evidence or a reason for skipping or unavailability.
    pass_criteria: |
      The changes record identifies validation expected by the plan or changed
      behavior. It records executed checks and results, or an explicit reason
      when a check is skipped or unavailable, without treating validation as
      permission to resume work gated by a significant divergence critique.
    failure_modes:
      - No validation evidence or skip reason accompanies changed behavior.
      - Treats a validation result as replacing the required critique gate.
    priority: high
    contract_ref: "rpi-implement Flow and Success criteria"

  - expectation_id: changes-record-path-named
    summary: Output names the changes record path under `.copilot-tracking/changes/<date>/`.
    signal: Output contains a path matching `.copilot-tracking/changes/<YYYY-MM-DD>/<slug>-changes.md`.
    pass_criteria: |
      Path is workspace-relative, dated subdir present, suffix `-changes.md`.
      The path may appear in the execution summary or review handoff.
    failure_modes:
      - Changes log not referenced.
      - Path written outside `.copilot-tracking/changes/` (e.g., session-state directories).
      - Missing date subdir or `-changes.md` suffix.
    priority: high
    contract_ref: "RPI tracking convention (`.copilot-tracking/changes/{{YYYY-MM-DD}}/{{task_slug}}-changes.md`)"

  - expectation_id: significant-divergence-critique-gate
    summary: Significant divergence links changes, amendments, phase details, and fresh critique before affected dependent work resumes.
    signal: Output identifies linked `DIV-xxx` and `AM-xxx` records, matching phase-detail updates, and a fresh generic `rpi-plan-critique` disposition.
    pass_criteria: |
      For a significant divergence, the changes record contains `DIV-xxx`, the
      plan contains its linked `AM-xxx` amendment, and the affected phase
      details are updated. Planning obtains a fresh generic critique that
      activates `rpi-plan-critique`; affected dependent work resumes only after
      a Pass disposition. Ordinary local judgment and non-material divergence
      do not activate this gate.
    failure_modes:
      - Significant divergence resumes dependent work without a fresh critique.
      - DIV-xxx lacks a linked AM-xxx or phase-detail update.
    priority: medium
    contract_ref: "rpi-implement Flow, Constraints, and Stop rules"

  - expectation_id: review-handoff-with-current-evidence
    summary: Completed implementation hands the complete evidence set to the canonical review record.
    signal: Output names completed and remaining IDs, validation state, linked changes or amendments, and the review-record path.
    pass_criteria: |
      When no affected dependent work awaits critique, the handoff identifies
      the changes path, completed and remaining `Pxx` or `Pxx-Txx` items,
      validation status, linked `CHG-xxx`, `DIV-xxx`, and `AM-xxx` evidence,
      and `.copilot-tracking/reviews/logs/<YYYY-MM-DD>/<slug>-review.md` for
      the review record.
    failure_modes:
      - Sends a significant amendment to review before its fresh critique.
      - Omits the changes evidence or canonical review path.
    priority: medium
    contract_ref: "rpi-implement Handoff and review-log template"
    applies_when: "Implementation scope is ready for review."

  - expectation_id: no-tracking-path-leak-outside-workspace
    summary: Tracking artifacts are written under workspace-relative `.copilot-tracking/`, not absolute or external paths.
    signal: Any tracking file path mentioned in the output is workspace-relative and starts with `.copilot-tracking/`.
    pass_criteria: |
      No occurrences of absolute filesystem paths (e.g., `C:\\Users\\...`,
      `/home/...`) or external state directories (e.g., `.copilot/session-state/`)
      for plan, details, changes, or research artifacts.
    failure_modes:
      - Plan or changes written to absolute path outside the workspace
        (mirrors current `task-planner` matrix failure mode).
      - Tracking files placed under non-`.copilot-tracking/` roots.
    priority: medium
    contract_ref: "RPI tracking conventions"

# Bucket-A expectations for task-reviewer
# Format: per-agent YAML, 5–10 grader-worthy expectations grounded in the agent
# file's explicit promises and/or current matrix failures. This file is consumed
# by the next pass that rewrites stimuli + graders end-to-end; do not treat it
# as a Vally grader file directly.
slug: task-reviewer
class: code-reviewer
agent_file: .github/agents/hve-core/task-reviewer.agent.md
stimulus_file: evals/agent-behavior/stimuli/task-reviewer.yml
latest_result: evals/results/agent-matrix/2026-05-28/task-reviewer.json
source_review_date: 2026-05-28

expectations:
  - expectation_id: evidence-set-reconciliation
    summary: Review reconciles one complete task evidence set without mutating it.
    signal: Output names plan, phase details, critique, amendments, changes, validation, and relevant research evidence.
    pass_criteria: |
      Review compares requirements, acceptance criteria, `Pxx` and `Pxx-Txx`
      completion evidence, critique dispositions, `AM-xxx` amendments,
      `CHG-xxx` changes, `DIV-xxx` divergences, and validation evidence for
      one task artifact set. It does not edit the plan, details, critique,
      research, or changes record.
    failure_modes:
      - Reviews only a plan or changes file while claiming a complete verdict.
      - Mutates implementation or planning evidence during review.
    priority: high
    contract_ref: "Task Reviewer and rpi-review Flow"

  - expectation_id: findings-with-severity
    summary: Output presents severity-graded `RV-xxx` findings tied to individual evidence.
    signal: Findings use `RV-xxx` identifiers, one of Critical, High, Medium, or Low, and an explicit destination.
    pass_criteria: |
      Each substantive finding has an `RV-xxx` ID, a severity of Critical,
      High, Medium, or Low, related `Pxx` or `Pxx-Txx` scope, evidence, impact,
      and the smallest useful next action with a destination.
    failure_modes:
      - Findings lack `RV-xxx`, severity, evidence, or routing.
      - Cosmetic or formatting preferences are recorded as substantive findings.
    priority: high
    contract_ref: "rpi-review Flow and review-log template"

  - expectation_id: review-log-path-named
    summary: Output names the canonical review record path.
    signal: Output contains a path matching `.copilot-tracking/reviews/logs/<YYYY-MM-DD>/<slug>-review.md`.
    pass_criteria: |
      Path is workspace-relative, includes `reviews/logs`, has a dated
      subdirectory, and ends in `-review.md`.
      The path may appear in the review response or its handoff.
    failure_modes:
      - Review log not referenced.
      - Path written outside `.copilot-tracking/reviews/logs/`.
      - Missing date subdir or `-review.md` suffix.
    priority: high
    contract_ref: "RPI tracking convention (`.copilot-tracking/reviews/logs/{{YYYY-MM-DD}}/{{task_slug}}-review.md`)"

  - expectation_id: execution-status-and-outcome-separated
    summary: Output separates execution state from acceptance outcome.
    signal: Output records execution as Complete, Partial, or Blocked and outcome as one of the canonical review verdicts.
    pass_criteria: |
      Review records execution status as `Complete`, `Partial`, or `Blocked`
      separately from outcome: `Conformant`, `Conformant with justified
      divergence`, `Defects found`, `Residual work`, or `Not accepted`.
    failure_modes:
      - Uses one undifferentiated status such as Complete or Needs Rework.
      - Implies acceptance from execution progress alone.
    priority: high
    contract_ref: "rpi-review Flow, Success criteria, and review-log template"

  - expectation_id: bounded-uncertainty-fan-out
    summary: Optional generic bounded fan-out occurs only to reduce a defined review uncertainty.
    signal: Output identifies the uncertainty, exact read boundary, and read-only authority for any independent review lens.
    pass_criteria: |
      A generic bounded subagent is used only when an independent lens reduces
      a stated uncertainty. Its question, exact read boundary, and no-source-
      write restriction are explicit. No dedicated review worker or fixed
      review-worker allowlist is required.
    failure_modes:
      - Requires a dedicated review worker.
      - Fans out without a defined uncertainty or grants source-write authority.
    priority: medium
    contract_ref: "rpi-review Flow"

  - expectation_id: next-owner-routing
    summary: Each actionable review gap routes to its responsible next owner.
    signal: Output routes defects to `rpi-implement`, decision gaps to `rpi-plan`, research gaps to `rpi-research`, and residual work to a distinct follow-up.
    pass_criteria: |
      Defects route to `rpi-implement`, decision gaps to `rpi-plan`, research
      gaps to `rpi-research`, and residual work to a distinct follow-up item.
      The review record names the next owner rather than silently merging
      residual work into a defect or plan decision.
    failure_modes:
      - Routes every finding back to implementation.
      - Omits next-owner routing or collapses residual work into another type.
    priority: medium
    contract_ref: "rpi-review Flow, Success criteria, and Handoff"

  - expectation_id: no-source-modifications
    summary: Review-only — no edits to source code or build manifests.
    signal: Output does not reference modifications to source-tree files.
    pass_criteria: |
      No occurrences of edit/create verbs paired with `.cs`/`.py`/`.ts`/`.js`/
      `.go`/`.rs`/`.java`/`package.json`/`pyproject.toml`/`Cargo.toml` paths.
      File paths may appear in findings as references to reviewed files, but
      not as files this agent itself edited.
    failure_modes:
      - Claims to edit source files during review.
      - Modifies `package.json` or build manifests while reviewing.
    priority: high
    contract_ref: "Task Reviewer Constraints and rpi-review Constraints"

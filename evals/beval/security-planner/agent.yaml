name: security-planner
description: >
  Security Planner — a six-phase application security planning agent that
  produces security models, standards mappings, and operational bucket
  analyses, detecting AI/ML components and recommending RAI Planner dispatch.
protocol: acp
connection:
  transport: tcp
  host: ${AGENT_HOST:-127.0.0.1}
  port: ${AGENT_PORT:-3000}
  cwd: ${AGENT_REPO_ROOT:-.}
  model: ${AGENT_MODEL:-claude-opus-4.6-1m}
init_prompt: "Launch .github/agents/security/security-planner.agent.md"
timeout: 120
retry:
  max_attempts: 2
  backoff: 5.0
metadata:
  domain: security
  version: "0.1"
